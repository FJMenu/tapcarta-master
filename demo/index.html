const TAPCARTA_PUBLIC_LOGO_URL = 'https://i.postimg.cc/xjtDSCW8/logo-app-web-sans-fond.png';
const LIVE_REQUESTS_ENABLED = true;
let LIVE_RESTAURANT_ID = '';
let clientOrderSyncUnavailable = false;
let clientBookingSyncUnavailable = false;

function normalizeRequestItems(items) {
  if (!Array.isArray(items)) return [];
  return items.map(item => ({
    id: item?.id || item?.dishId || '',
    name: item?.name || item?.title || '',
    quantity: Number(item?.quantity || 1),
    price: Number(item?.price || 0)
  }));
}

async function insertLiveRequest(payload) {
  const { data, error } = await supabaseClient
    .from('requests')
    .insert([payload])
    .select()
    .single();

  if (error) throw error;
  return data;
}

 async function fetchLiveRequestById(requestId, requestType = null) {
  if (!requestId || !LIVE_RESTAURANT_ID) return null;

  let query = supabaseClient
    .from('requests')
    .select('*')
    .eq('id', requestId)
    .eq('restaurant_id', LIVE_RESTAURANT_ID);

  if (requestType) {
    query = query.eq('type', requestType);
  }

  const { data, error } = await query.maybeSingle();

  if (error) throw error;
  return data || null;
}

async function fetchLiveRequestsByType(requestType) {
  if (requestType === 'booking') {
    return await readBookingRequestsFromStorage();
  }

  if (requestType === 'order') {
    return await readOrderRequestsFromSource();
  }

  return [];
}

function mapLiveBookingRowToRequest(row) {
  if (!row) return null;

  const preorderItems = Array.isArray(row.items)
    ? row.items.map((item) => ({
        id: item?.id || '',
        name: item?.name || '',
        category: item?.category || '',
        quantity: Number(item?.quantity || 1),
        price: Number(item?.price || 0)
      }))
    : [];

  return {
    restaurantId: row.restaurant_id || LIVE_RESTAURANT_ID,
    requestId: row.id,
    liveRequestId: row.id,
    requestType: 'booking',
    createdAt: row.created_at || new Date().toISOString(),
    updatedAt: row.updated_at || null,
    status: row.status || 'pending',
    customer: {
      name: row.client_name || '',
      phone: row.client_phone || '',
      language: row.client_language || 'fr'
    },
    booking: {
      date: row.booking_date || '',
      time: row.booking_time ? String(row.booking_time).slice(0, 5) : '',
      people: Number(row.party_size || 1),
      note: row.note || '',
      preorderIndicativeEnabled: true,
      preorderItems
    },
    restaurantResponse: {
      reason: '',
      message: row.restaurant_message || '',
      updatedBy: ''
    }
  };
}

function mapLiveOrderRowToRequest(row) {
  if (!row) return null;

  const orderItems = Array.isArray(row.items)
    ? row.items.map((item) => {
        const quantity = Number(item?.quantity || 1);
        const unitPrice = Number(item?.unitPrice ?? item?.price ?? 0);
        const lineTotal = Number(item?.lineTotal ?? (unitPrice * quantity));

        return {
          id: item?.id || '',
          name: item?.name || '',
          category: item?.category || '',
          quantity,
          price: Number.isFinite(unitPrice) ? unitPrice : 0,
          unitPrice: Number.isFinite(unitPrice) ? unitPrice : null,
          lineTotal: Number.isFinite(lineTotal) ? Number(lineTotal.toFixed(2)) : null
        };
      })
    : [];

  const totalAmount = orderItems.reduce(
    (sum, item) => sum + Number(item.lineTotal ?? (Number(item.price || 0) * Number(item.quantity || 1))),
    0
  );

  return {
    restaurantId: row.restaurant_id || LIVE_RESTAURANT_ID,
    requestId: row.id,
    liveRequestId: row.id,
    requestType: 'order',
    createdAt: row.created_at || new Date().toISOString(),
    updatedAt: row.updated_at || null,
    status: row.status || 'pending',
    customer: {
      name: row.client_name || '',
      phone: row.client_phone || '',
      language: row.client_language || 'fr'
    },
    order: {
      date: row.booking_date || '',
      time: row.booking_time ? String(row.booking_time).slice(0, 5) : '',
      note: row.note || '',
      items: orderItems,
      totalAmount: Number(totalAmount.toFixed(2))
    },
    restaurantResponse: {
      reason: row.status || '',
      message: row.restaurant_message || '',
      updatedBy: row.restaurant_message ? 'restaurant' : ''
    }
  };
}

    whatsapp: true

};

  snacks: [],
  entrees: [],
  plats: [],
  moules: [],

  suggestions: [],
  supplements: [],
  boissons: []
};

let menuMeta = {
  updatedAt: null,
  menuVersion: null,
  categories: {
    snacks: { visible: true, order: 9999, updatedAt: null, name: '' },
    entrees: { visible: true, order: 9999, updatedAt: null, name: '' },

    supplements: { visible: true, order: 9999, updatedAt: null, name: '' },
    boissons: { visible: true, order: 9999, updatedAt: null, name: '' }
  }
};

function formatAdminPrice(price) {
  if (price === null || price === undefined || price === '') return '';
  const numericPrice = Number(price);
  if (Number.isNaN(numericPrice)) return String(price);
  return `${numericPrice.toFixed(2).replace('.', ',')} €`;
}

function mapAdminItems(items) {
  if (!Array.isArray(items)) return [];

  return items
    .map((item, index) => ({
      rawItem: item,
      fallbackIndex: index
    }))
    .filter(({ rawItem }) => rawItem && rawItem.visible !== false)
    .sort((a, b) => ((a.rawItem.order || 9999) - (b.rawItem.order || 9999)))
    .map(({ rawItem, fallbackIndex }) => ({
      id: rawItem.id || `item-${fallbackIndex + 1}`,
      price: formatAdminPrice(rawItem.price),
      adminName: rawItem.name || '',
      adminSubtitle: rawItem.subtitle || '',
      visible: rawItem.visible !== false,
      available: rawItem.available !== false,
      order: Number.isFinite(rawItem.order) ? rawItem.order : 9999,
      updatedAt: rawItem.updatedAt || null
    }));
}

function resetMenuData() {
  Object.keys(menuData).forEach(categoryKey => {
    menuData[categoryKey] = [];
  });

  Object.keys(menuMeta.categories).forEach(categoryKey => {
    menuMeta.categories[categoryKey] = {
      visible: true,
      order: 9999,
      updatedAt: null
    };
  });

  menuMeta.updatedAt = null;
  menuMeta.menuVersion = null;
}

async function loadRestaurantData() {
  const response = await fetch(RESTAURANT_JSON_URL, { cache: 'no-store' });
  if (!response.ok) {
    throw new Error(`Impossible de charger ${RESTAURANT_JSON_URL}`);
  }

  const restaurantData = await response.json();

  if (restaurantData?.identity?.id) {
    siteConfig.identity.id = restaurantData.identity.id;
    LIVE_RESTAURANT_ID = restaurantData.identity.id;
  }

  if (restaurantData?.identity?.name) {
    siteConfig.restaurantName = restaurantData.identity.name;
  }

  if (LIVE_RESTAURANT_ID) {
    try {
      const { data: liveMenuRow, error: liveMenuError } = await supabaseClient
        .from('restaurant_menus')
        .select('menu_json, menu_version, updated_at')
        .eq('restaurant_id', LIVE_RESTAURANT_ID)
        .maybeSingle();

      if (liveMenuError) {
        throw liveMenuError;
      }

      if (liveMenuRow?.menu_json && typeof liveMenuRow.menu_json === 'object') {
        restaurantData.menu = {
          ...liveMenuRow.menu_json,
          menuVersion:
            liveMenuRow.menu_version ??
            liveMenuRow.menu_json?.menuVersion ??
            restaurantData?.menu?.menuVersion ??
            null,
          updatedAt:
            liveMenuRow.updated_at ??
            liveMenuRow.menu_json?.updatedAt ??
            restaurantData?.menu?.updatedAt ??
            null
        };
      }
    } catch (error) {
      console.error('Erreur lecture menu live Supabase :', error);
    }
  }

  const restaurantLifecycle =
    restaurantData?.status?.lifecycle ||
    restaurantData?.identity?.status ||
    'active';

  const isRestaurantActive = restaurantLifecycle === 'active';

  siteConfig.modules = {
    ordering: isRestaurantActive && restaurantData?.modules?.ordering !== false,
    booking: isRestaurantActive && restaurantData?.modules?.booking !== false,
    preorderIndicative: isRestaurantActive && restaurantData?.modules?.preorderIndicative !== false,
    googleReviews: isRestaurantActive && restaurantData?.modules?.googleReviews !== false,
    whatsapp: isRestaurantActive && restaurantData?.modules?.whatsapp !== false
  };

  if (!siteConfig.modules.ordering && orderMode) {
    orderMode = false;
    cartPanelOpen = false;
    orderReviewOpen = false;
  }

  const activeLanguages = Array.isArray(restaurantData?.languages?.active)
    ? restaurantData.languages.active
    : (Array.isArray(restaurantData?.identity?.languages) ? restaurantData.identity.languages : []);

  if (activeLanguages.length > 0) {
    supportedLangs.length = 0;
    activeLanguages.forEach(lang => {
      if (translations[lang]) supportedLangs.push(lang);
    });

    if (!supportedLangs.includes(currentLang)) {
      currentLang = supportedLangs.includes('fr') ? 'fr' : supportedLangs[0];
    }
  }

  resetMenuData();

  menuMeta.updatedAt = restaurantData?.menu?.updatedAt || null;
  menuMeta.menuVersion = restaurantData?.menu?.menuVersion || null;

  if (Array.isArray(restaurantData?.menu?.categories)) {
    restaurantData.menu.categories.forEach(category => {
      if (!category?.id) return;
      if (!Object.prototype.hasOwnProperty.call(menuData, category.id)) return;

 menuMeta.categories[category.id] = {
        visible: category.visible !== false,
        order: Number.isFinite(category.order) ? category.order : 9999,
        updatedAt: category.updatedAt || null,
        name: category.name || ''
      };
      if (category.visible === false) {
        menuData[category.id] = [];
        return;
      }

      menuData[category.id] = mapAdminItems(category.items);
    });
  }

  return restaurantData;
}

const supportedLangs = ['fr', 'es', 'en', 'nl'];
const LANGUAGE_STORAGE_KEY = 'tapcarta-selected-language';

function detectLanguage() {
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  if (urlLang && supportedLangs.includes(urlLang)) {
    localStorage.setItem(LANGUAGE_STORAGE_KEY, urlLang);
    return urlLang;
  }

  const savedLang = localStorage.getItem(LANGUAGE_STORAGE_KEY);
  if (savedLang && supportedLangs.includes(savedLang)) {
    return savedLang;
  }

  const browserLang = (navigator.language || navigator.userLanguage || 'es').substring(0, 2).toLowerCase();
  return supportedLangs.includes(browserLang) ? browserLang : 'es';
}

      const iosHelp = document.getElementById('ios-install-help');

          clearTimeout(installHelpTimeout);
          iosHelp.hidden = false;
          iosHelp.innerHTML = t.samsungInstallHelp;

        try {
          const choiceResult = await deferredInstallPrompt.userChoice;

          if (choiceResult && choiceResult.outcome === 'accepted') {
            clearTimeout(installFallbackTimeout);
            installFallbackTimeout = setTimeout(() => {
              if (isInStandaloneMode()) {
                showInstallToast();
              }
            }, 1200);

        deferredInstallPrompt = null;
        updateInstallUI();

      if (isIos() && !isInStandaloneMode()) {
        if (iosHelp) {
          if (!iosHelp.hidden) {
            clearTimeout(installHelpTimeout);

            return;
          }

function roundTimeToQuarter(timeStr) {
  if (!timeStr || !timeStr.includes(':')) return timeStr;

  const [rawHours, rawMinutes] = timeStr.split(':');
  let hours = Number(rawHours);
  let minutes = Number(rawMinutes);

  if (Number.isNaN(hours) || Number.isNaN(minutes)) return timeStr;

  let roundedMinutes = Math.ceil(minutes / 15) * 15;

  if (roundedMinutes === 60) {
    hours += 1;
    roundedMinutes = 0;
  }

  if (hours >= 24) {
    hours = 23;
    roundedMinutes = 45;
  }

  return `${String(hours).padStart(2, '0')}:${String(roundedMinutes).padStart(2, '0')}`;
}

function buildBookingRequest() {
  const preorderEnabled = siteConfig.modules?.preorderIndicative !== false;
  const preorderItems = preorderEnabled && Array.isArray(bookingForm.preorder)
    ? bookingForm.preorder
        .map((itemId) => {
          const option = getBookingPreorderOptions().find((item) => item.id === itemId);
          if (!option) return null;

          return {
            id: option.id,
            name: option.name,
            category: option.categoryLabel
          };
        })
        .filter(Boolean)
    : [];

  const nowIso = new Date().toISOString();

  return {
    restaurantId: siteConfig?.identity?.id || '',
    requestId: `booking_${Date.now()}`,
    requestType: 'booking',
    createdAt: nowIso,
    updatedAt: nowIso,
    status: 'pending',
    customer: {
      name: bookingForm.name,
      phone: bookingForm.phone,
      language: currentLang
    },
    booking: {
      date: bookingForm.date,
      time: bookingForm.time,
      people: Number(bookingForm.people),
      note: bookingForm.note || '',
      preorderIndicativeEnabled: preorderEnabled,
      preorderItems
    },
    restaurantResponse: {
      reason: '',
      message: '',
      updatedBy: ''
    }
  };
}

function getBookingStorageKey() {
  return 'tapcarta_booking_requests';
}

function getLastBookingStorageKey() {
  return 'tapcarta_last_booking_request';
}
async function readBookingRequestsFromStorage() {
  if (LIVE_REQUESTS_ENABLED) {
    try {
      const { data, error } = await supabaseClient
        .from('requests')
        .select('*')
        .eq('restaurant_id', LIVE_RESTAURANT_ID)
        .eq('type', 'booking')
        .order('created_at', { ascending: false });

      if (error) throw error;

      const liveRequests = Array.isArray(data)
        ? data.map(mapLiveBookingRowToRequest).filter(Boolean)
        : [];

      writeBookingRequestsToStorage(liveRequests.slice(0, 20));

      await syncLastBookingRequestFromSource();

      clientBookingSyncUnavailable = false;
      return liveRequests;
    } catch (error) {
      console.error('Supabase booking read error:', error);
      clientBookingSyncUnavailable = true;
      return [];
    }
  }

  try {
    const raw = localStorage.getItem(getBookingStorageKey());
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [];
  }
}

function writeBookingRequestsToStorage(requests) {
  localStorage.setItem(getBookingStorageKey(), JSON.stringify(requests));
}

async function writeBookingRequestToSource(bookingRequest) {
  if (LIVE_REQUESTS_ENABLED) {
    const liveBooking = await insertLiveRequest({
      restaurant_id: bookingRequest?.restaurantId || LIVE_RESTAURANT_ID,
      type: 'booking',
      client_name: bookingRequest?.customer?.name || '',
      client_phone: bookingRequest?.customer?.phone || '',
      client_language: bookingRequest?.customer?.language || currentLang || 'fr',
      booking_date: bookingRequest?.booking?.date || '',
      booking_time: bookingRequest?.booking?.time || '',
      party_size: Number(bookingRequest?.booking?.people || 1),
      items: normalizeRequestItems(bookingRequest?.booking?.preorderItems || []),
      note: bookingRequest?.booking?.note || '',
      status: 'pending'
    });

    const syncedBookingRequest = {
      ...bookingRequest,
      liveRequestId: liveBooking.id,
      requestId: liveBooking.id,
      status: liveBooking.status || 'pending',
      createdAt: liveBooking.created_at || bookingRequest.createdAt,
      updatedAt: liveBooking.updated_at || bookingRequest.updatedAt || null
    };

    localStorage.setItem(getLastBookingStorageKey(), JSON.stringify(syncedBookingRequest));
    return [syncedBookingRequest];
  }

  const maxItems = 20;
  const existingRequests = await readBookingRequestsFromStorage();
  const updatedRequests = [bookingRequest, ...existingRequests].slice(0, maxItems);

  writeBookingRequestsToStorage(updatedRequests);
  localStorage.setItem(getLastBookingStorageKey(), JSON.stringify(bookingRequest));

  return updatedRequests;
}

async function saveBookingRequestLocally(bookingRequest) {
  return await writeBookingRequestToSource(bookingRequest);
}

async function syncLastBookingRequestFromSource() {
  if (!LIVE_REQUESTS_ENABLED) {
    clientBookingSyncUnavailable = false;
    return getLastBookingRequest();
  }

  try {
    const rawLastBooking = localStorage.getItem(getLastBookingStorageKey());
    const parsedLastBooking = rawLastBooking ? JSON.parse(rawLastBooking) : null;
    const liveRequestId = parsedLastBooking?.liveRequestId || parsedLastBooking?.requestId || null;

    if (!liveRequestId) {
      clientBookingSyncUnavailable = false;
      return null;
    }

    const liveRow = await fetchLiveRequestById(liveRequestId, 'booking');
    const syncedLastBooking = mapLiveBookingRowToRequest(liveRow);

    if (!syncedLastBooking) {
      clientBookingSyncUnavailable = false;
      localStorage.removeItem(getLastBookingStorageKey());
      return null;
    }

    const mergedLastBooking = {
      ...syncedLastBooking,
      restaurantResponse: {
        ...(parsedLastBooking?.restaurantResponse || {}),
        ...(syncedLastBooking.restaurantResponse || {})
      }
    };

    localStorage.setItem(getLastBookingStorageKey(), JSON.stringify(mergedLastBooking));

    clientBookingSyncUnavailable = false;
    return mergedLastBooking;
  } catch (error) {
    console.error('Supabase booking sync error:', error);
    clientBookingSyncUnavailable = true;
    return null;
  }
}
async function updateStoredBookingRequest(updatedRequest) {
  if (!updatedRequest || !updatedRequest.requestId) return null;

  const liveRequestId = updatedRequest.liveRequestId || updatedRequest.requestId || null;

  if (LIVE_REQUESTS_ENABLED) {
    if (!liveRequestId) {
      console.warn('Supabase booking update impossible : aucun ID live disponible.');
      return null;
    }

    try {
      let query = supabaseClient
        .from('requests')
        .update({
          client_name: updatedRequest?.customer?.name || '',
          client_phone: updatedRequest?.customer?.phone || '',
          client_language: updatedRequest?.customer?.language || currentLang || 'fr',
          booking_date: updatedRequest?.booking?.date || '',
          booking_time: updatedRequest?.booking?.time || '',
          party_size: Number(updatedRequest?.booking?.people || 1),
          items: normalizeRequestItems(updatedRequest?.booking?.preorderItems || []),
          note: updatedRequest?.booking?.note || '',
          status: updatedRequest?.status || 'pending'
        })
        .eq('id', liveRequestId)
        .eq('restaurant_id', updatedRequest?.restaurantId || LIVE_RESTAURANT_ID)
        .eq('type', 'booking');

      if (['accepted_by_client', 'rejected_by_client'].includes(updatedRequest?.status || '')) {
        query = query.eq('status', 'modified');
      }

      if ((updatedRequest?.status || '') === 'cancelled') {
        query = query.in('status', ['pending', 'processing', 'modified']);
      }

      const { data, error } = await query
        .select('*')
        .maybeSingle();

      if (error) throw error;

      if (!data) {
        console.warn('Supabase booking update: aucune ligne mise à jour pour id =', liveRequestId);
        alert(`Supabase n'a mis à jour aucune réservation.\nLa demande a peut-être déjà changé de statut côté restaurant.\nID utilisé : ${liveRequestId}`);
        await readBookingRequestsFromStorage();
        return null;
      }

      const syncedRequest = mapLiveBookingRowToRequest(data) || updatedRequest;
      const mergedRequest = {
        ...updatedRequest,
        ...syncedRequest,
        liveRequestId: syncedRequest.liveRequestId || liveRequestId,
        requestId: syncedRequest.requestId || liveRequestId,
        status: syncedRequest.status || updatedRequest.status,
        updatedAt: syncedRequest.updatedAt || updatedRequest.updatedAt,
        clientDecision: updatedRequest.clientDecision || '',
        clientDecisionAt: updatedRequest.clientDecisionAt || '',
        restaurantResponse: {
          ...(syncedRequest.restaurantResponse || {}),
          ...(updatedRequest.restaurantResponse || {})
        }
      };

      localStorage.setItem(getLastBookingStorageKey(), JSON.stringify(mergedRequest));

      const existingRequests = await readBookingRequestsFromStorage();
      const withoutDuplicate = existingRequests.filter(
        (entry) => String(entry?.requestId) !== String(mergedRequest.requestId)
      );

      writeBookingRequestsToStorage([mergedRequest, ...withoutDuplicate].slice(0, 20));

      return mergedRequest;
    } catch (error) {
      console.error('Supabase booking update error:', error);
      alert(`Erreur Supabase update réservation : ${error?.message || error}`);
      return null;
    }
  }

  localStorage.setItem(getLastBookingStorageKey(), JSON.stringify(updatedRequest));

  const existingRequests = await readBookingRequestsFromStorage();
  const updatedRequests = existingRequests.map((request) =>
    request && request.requestId === updatedRequest.requestId ? updatedRequest : request
  );

  writeBookingRequestsToStorage(updatedRequests);
  localStorage.setItem(getLastBookingStorageKey(), JSON.stringify(updatedRequest));

  return updatedRequest;
}

function formatBookingDateForDisplay(dateValue) {
  if (!dateValue) return '-';

  const parts = String(dateValue).split('-');
  if (parts.length !== 3) return dateValue;

  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function formatBookingDateTimeForDisplay(dateTimeValue) {
  if (!dateTimeValue) return '';

  const dateObj = new Date(dateTimeValue);
  if (Number.isNaN(dateObj.getTime())) return '';

  const day = String(dateObj.getDate()).padStart(2, '0');
  const month = String(dateObj.getMonth() + 1).padStart(2, '0');
  const year = dateObj.getFullYear();
  const hours = String(dateObj.getHours()).padStart(2, '0');
  const minutes = String(dateObj.getMinutes()).padStart(2, '0');

  return `${day}/${month}/${year} ${hours}:${minutes}`;
}

function buildBookingRequestSummaryText(bookingRequest) {
  const tBooking = getBookingTexts(currentLang);
  const proposedTimeLabel = currentLang === 'fr'
    ? 'Horaire proposé'
    : currentLang === 'es'
      ? 'Hora propuesta'
      : currentLang === 'nl'
        ? 'Voorgesteld uur'
        : 'Proposed time';

  const restaurantMessageLabel = currentLang === 'fr'
    ? 'Message du restaurant'
    : currentLang === 'es'
      ? 'Mensaje del restaurante'
      : currentLang === 'nl'
        ? 'Bericht van het restaurant'
        : 'Restaurant message';

  const lines = [
    `${tBooking.bookingName}: ${bookingRequest?.customer?.name || '-'}`,
    `${tBooking.bookingPhone}: ${bookingRequest?.customer?.phone || '-'}`,
    `${tBooking.bookingDate}: ${formatBookingDateForDisplay(bookingRequest?.booking?.date || '')}`,
    `${tBooking.bookingTime}: ${bookingRequest?.booking?.time || '-'}`,
    `${tBooking.bookingPeople}: ${bookingRequest?.booking?.people || '-'}`,
    `${tBooking.bookingStatusLabel}: ${getBookingStatusLabel(bookingRequest?.status || 'pending')}`
  ];

  const proposedTime = bookingRequest?.restaurantResponse?.proposal?.proposedTime || '';
  if (proposedTime) {
    lines.push(`${proposedTimeLabel}: ${proposedTime}`);
  }

  const restaurantMessage = bookingRequest?.restaurantResponse?.message || '';
  if (restaurantMessage) {
    lines.push(`${restaurantMessageLabel}: ${restaurantMessage}`);
  }

  if (bookingRequest?.booking?.note) {
    lines.push(`${tBooking.bookingNote}: ${bookingRequest.booking.note}`);
  }

  const preorderItems = Array.isArray(bookingRequest?.booking?.preorderItems)
    ? bookingRequest.booking.preorderItems
    : [];

  if (preorderItems.length) {
    lines.push(`${tBooking.bookingPreorder}: ${preorderItems.map((item) => item.name).join(', ')}`);
  }

  return lines.join('\n');
}

async function viewLastBookingRequest() {
  if (LIVE_REQUESTS_ENABLED) {
    await readBookingRequestsFromStorage();

    if (clientBookingSyncUnavailable) {
      openClientHistoryModal(getClientHistoryTexts().currentBooking, renderClientSyncUnavailableCard('booking'));

  const bookingRequest = getLastBookingRequest();

  removeBookingSummaryModal();
  document.body.insertAdjacentHTML('beforeend', buildBookingSummaryModalHtml(bookingRequest));

  const modal = document.getElementById('booking-summary-modal');

window.acceptLastBookingModification = async function() {
  const bookingRequest = getLastBookingRequest();
  if (!bookingRequest || (bookingRequest.status || 'pending') !== 'modified') return;

  const hadOpenBookingSummaryModal = Boolean(document.getElementById('booking-summary-modal'));
  const hadOpenHistoryModal = Boolean(document.getElementById('client-history-modal'));
  const nowIso = new Date().toISOString();
  const updatedRequest = {
    ...bookingRequest,
    status: 'accepted_by_client',
    updatedAt: nowIso,
    clientDecision: 'accepted',
    clientDecisionAt: nowIso,
    restaurantResponse: {
      ...(bookingRequest.restaurantResponse || {}),
      clientDecision: 'accepted',
      clientDecisionAt: nowIso
    }
  };

  const syncedBookingRequest = await updateStoredBookingRequest(updatedRequest);

  if (!syncedBookingRequest) {
    return;
  }

  await readBookingRequestsFromStorage();
  renderMenu();

  if (hadOpenBookingSummaryModal) {
    removeBookingSummaryModal();

  setTimeout(() => {

    if (bookingCard) {
      bookingCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 80);
};

async function editLastBookingRequest() {
  if (LIVE_REQUESTS_ENABLED) {
    const syncedBookingRequest = await syncLastBookingRequestFromSource();

    if (clientBookingSyncUnavailable) {
      await refreshClientRequestCards();
      return;
    }

    if (!syncedBookingRequest) {
      renderMenu();
      return;
    }
  }

  const bookingRequest = getLastBookingRequest();

  if (!bookingRequest) return;

  if ([
    'cancelled',
    'cancelled_by_client',
    'confirmed',
    'refused',
    'arrived',
    'not_arrived',
    'presence_unknown_no_action',
    'modified',
    'accepted_by_client',
    'rejected_by_client'
  ].includes(bookingRequest.status || 'pending')) {
    renderMenu();
    return;
  }

  editingBookingRequestId = bookingRequest.requestId || null;
  loadBookingRequestIntoForm(bookingRequest);
  bookingMode = true;
  renderMenu();

  setTimeout(() => {
    const bookingCard = document.getElementById('client-booking-card');
    if (bookingCard) {
      bookingCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 80);
}
async function cancelLastBookingRequest() {
  const bookingRequest = getLastBookingRequest();

  if (!bookingRequest) return;
  if (['cancelled', 'confirmed', 'refused', 'accepted_by_client', 'rejected_by_client'].includes(bookingRequest.status || 'pending')) return;

  const tBooking = getBookingTexts(currentLang);

  if (!confirm(tBooking.bookingCancelConfirm)) {
    return;
  }

  const updatedRequest = {
    ...bookingRequest,
    status: 'cancelled',
    cancelledAt: new Date().toISOString()
  };

  const syncedBookingRequest = await updateStoredBookingRequest(updatedRequest);

  if (!syncedBookingRequest) {
    return;
  }

  if (editingBookingRequestId && editingBookingRequestId === bookingRequest.requestId) {
    editingBookingRequestId = null;
  }

  await readBookingRequestsFromStorage();
  alert(tBooking.bookingCancelledAlert);
  renderMenu();
}

async function validateAndSubmitBooking() {

  bookingForm.name = (bookingForm.name || '').trim();
  bookingForm.phone = (bookingForm.phone || '').trim();
  bookingForm.date = (bookingForm.date || '').trim();
  bookingForm.time = roundTimeToQuarter((bookingForm.time || '').trim());
  bookingForm.people = String(bookingForm.people || '').trim();
  bookingForm.note = (bookingForm.note || '').trim();

  if (!bookingForm.name || !bookingForm.phone || !bookingForm.date || !bookingForm.time || !bookingForm.people) {
    setBookingFeedback(
      'error',
      getMissingBookingFieldFeedbackKey({
        name: bookingForm.name,
        phone: bookingForm.phone,
        date: bookingForm.date,
        time: bookingForm.time,
        people: bookingForm.people
      })
    );
    renderMenu();
    return;
  }

  const normalizedPhone = bookingForm.phone.replace(/[^\d+]/g, '');
  const digitCount = normalizedPhone.replace(/\D/g, '').length;
  const phonePattern = /^\+?[0-9]{8,15}$/;

  if (!phonePattern.test(normalizedPhone) || digitCount < 8) {
    setBookingFeedback('error', 'invalidPhone');
    renderMenu();
    return;
  }

  if (Number(bookingForm.people) < 1) {
    setBookingFeedback('error', 'invalidPeople');
    renderMenu();
    return;
  }

  bookingForm.phone = normalizedPhone;
  clearBookingFeedback();

  const existingBookingRequests = LIVE_REQUESTS_ENABLED
    ? await fetchLiveRequestsByType('booking')
    : await readBookingRequestsFromStorage();

  const existingBookingRequest = editingBookingRequestId
    ? existingBookingRequests.find((request) => request && request.requestId === editingBookingRequestId)
    : null;

  if (
    LIVE_REQUESTS_ENABLED &&
    existingBookingRequest &&
    !['pending', 'processing'].includes(existingBookingRequest.status || 'pending')
  ) {
    editingBookingRequestId = null;
    await readBookingRequestsFromStorage();
    renderMenu();
    return;
  }

  const bookingRequest = buildBookingRequest();

  bookingRequest.requestId = existingBookingRequest?.requestId || bookingRequest.requestId;
  bookingRequest.createdAt = existingBookingRequest?.createdAt || bookingRequest.createdAt;
  bookingRequest.updatedAt = existingBookingRequest ? new Date().toISOString() : null;
  bookingRequest.status = existingBookingRequest?.status === 'cancelled'
    ? 'pending'
    : (existingBookingRequest?.status || bookingRequest.status);

  let bookingRequests;
  const isEditingExistingBooking = Boolean(existingBookingRequest);

  if (existingBookingRequest) {
    const syncedBookingRequest = await updateStoredBookingRequest(bookingRequest);

    if (!syncedBookingRequest) {
      renderMenu();
      return;
    }

    bookingRequests = LIVE_REQUESTS_ENABLED
      ? await fetchLiveRequestsByType('booking')
      : await readBookingRequestsFromStorage();
  } else {
    bookingRequests = await saveBookingRequestLocally(bookingRequest);
  }

  editingBookingRequestId = null;

  console.log('TapCarta booking request saved:', bookingRequest);
  console.log('TapCarta booking requests history:', bookingRequests);

  resetBookingForm();
  renderMenu();

  setTimeout(() => {
    const bookingCard = document.getElementById('client-booking-card');
    if (bookingCard) {
      bookingCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 80);
}

function getOrderStorageKey() {
  return 'tapcarta_order_requests';
}

function getLastOrderStorageKey() {
  return 'tapcarta_last_order_request';
}

function readOrderRequestsFromStorage() {
  try {
    const raw = localStorage.getItem(getOrderStorageKey());
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [];
  }
}

function writeOrderRequestsToStorage(requests) {
  localStorage.setItem(getOrderStorageKey(), JSON.stringify(requests));
}

async function syncLastOrderRequestFromSource() {
  if (!LIVE_REQUESTS_ENABLED) {
    clientOrderSyncUnavailable = false;
    return getLastOrderRequest();
  }

  try {
    const rawLastOrder = localStorage.getItem(getLastOrderStorageKey());
    const parsedLastOrder = rawLastOrder ? JSON.parse(rawLastOrder) : null;
    const liveRequestId = parsedLastOrder?.liveRequestId || parsedLastOrder?.requestId || null;

    if (!liveRequestId) {
      clientOrderSyncUnavailable = false;
      return null;
    }

    const liveRow = await fetchLiveRequestById(liveRequestId, 'order');
    const syncedLastOrder = mapLiveOrderRowToRequest(liveRow);

    if (!syncedLastOrder) {
      clientOrderSyncUnavailable = false;
      localStorage.removeItem(getLastOrderStorageKey());
      return null;
    }

    const mergedLastOrder = {
      ...syncedLastOrder,
      restaurantResponse: {
        ...(parsedLastOrder?.restaurantResponse || {}),
        ...(syncedLastOrder.restaurantResponse || {})
      }
    };

    localStorage.setItem(getLastOrderStorageKey(), JSON.stringify(mergedLastOrder));

    const existingOrders = readOrderRequestsFromStorage();
    const withoutDuplicate = existingOrders.filter(
      (entry) => String(entry?.requestId) !== String(mergedLastOrder.requestId)
    );

    writeOrderRequestsToStorage([mergedLastOrder, ...withoutDuplicate].slice(0, 20));

    clientOrderSyncUnavailable = false;
    return mergedLastOrder;
  } catch (error) {
    console.error('Supabase order sync error:', error);
    clientOrderSyncUnavailable = true;
    return null;
  }
}

async function readOrderRequestsFromSource() {
  if (LIVE_REQUESTS_ENABLED) {
    try {
      const { data, error } = await supabaseClient
        .from('requests')
        .select('*')
        .eq('restaurant_id', LIVE_RESTAURANT_ID)
        .eq('type', 'order')
        .order('created_at', { ascending: false });

      if (error) throw error;

      const liveOrders = Array.isArray(data)
        ? data.map(mapLiveOrderRowToRequest).filter(Boolean)
        : [];

      writeOrderRequestsToStorage(liveOrders.slice(0, 20));
      await syncLastOrderRequestFromSource();

      clientOrderSyncUnavailable = false;
      return liveOrders;
    } catch (error) {
      console.error('Supabase order read error:', error);
      clientOrderSyncUnavailable = true;
      return [];
    }
  }

  return readOrderRequestsFromStorage();
}

async function writeOrderRequestToSource(orderRequest) {
  if (LIVE_REQUESTS_ENABLED) {
    const liveOrder = await insertLiveRequest({
      restaurant_id: orderRequest?.restaurantId || LIVE_RESTAURANT_ID,
      type: 'order',
      status: 'pending',
      client_name: orderRequest?.customer?.name || '',
      client_phone: orderRequest?.customer?.phone || '',
      client_language: orderRequest?.customer?.language || currentLang || 'fr',
      booking_date: orderRequest?.order?.date || null,
      booking_time: orderRequest?.order?.time || null,
      party_size: null,
      items: Array.isArray(orderRequest?.order?.items)
        ? orderRequest.order.items.map((item) => ({
            id: item?.id || '',
            name: item?.name || '',
            quantity: Number(item?.quantity || 1),
            price: Number(item?.unitPrice || item?.price || 0),
            unitPrice: item?.unitPrice ?? null,
            lineTotal: item?.lineTotal ?? null
          }))
        : [],
      note: orderRequest?.order?.note || '',
      restaurant_message: orderRequest?.restaurantResponse?.message || ''
    });

    const syncedOrderRequest = {
      ...orderRequest,
      liveRequestId: liveOrder.id,
      requestId: liveOrder.id,
      status: liveOrder.status || 'pending',
      createdAt: liveOrder.created_at || orderRequest.createdAt,
      updatedAt: liveOrder.updated_at || orderRequest.updatedAt || null
    };

    const existingRequests = readOrderRequestsFromStorage();
    const withoutDuplicate = existingRequests.filter(
      (entry) => String(entry?.requestId) !== String(syncedOrderRequest.requestId)
    );
    const updatedRequests = [syncedOrderRequest, ...withoutDuplicate].slice(0, 20);

    writeOrderRequestsToStorage(updatedRequests);
    localStorage.setItem(getLastOrderStorageKey(), JSON.stringify(syncedOrderRequest));

    return updatedRequests;
  }

  const maxItems = 20;
  const existingRequests = readOrderRequestsFromStorage();
  const updatedRequests = [orderRequest, ...existingRequests].slice(0, maxItems);

  writeOrderRequestsToStorage(updatedRequests);
  localStorage.setItem(getLastOrderStorageKey(), JSON.stringify(orderRequest));

  return updatedRequests;
}

async function saveOrderRequestLocally(orderRequest) {
  return await writeOrderRequestToSource(orderRequest);
}

  } catch (error) {
    return null;
  }
}
async function updateStoredOrderRequest(updatedOrderRequest) {
  if (!updatedOrderRequest || !updatedOrderRequest.requestId) return null;

  const liveRequestId = updatedOrderRequest.liveRequestId || updatedOrderRequest.requestId || null;

  if (LIVE_REQUESTS_ENABLED) {
    if (!liveRequestId) {
      console.warn('Supabase order update impossible : aucun ID live disponible.');
      return null;
    }

    try {
      let query = supabaseClient
        .from('requests')
        .update({
          status: updatedOrderRequest?.status || 'pending',
          restaurant_message: updatedOrderRequest?.restaurantResponse?.message || ''
        })
        .eq('id', liveRequestId)
        .eq('restaurant_id', updatedOrderRequest?.restaurantId || LIVE_RESTAURANT_ID)
        .eq('type', 'order');

      if (['accepted_by_client', 'rejected_by_client'].includes(updatedOrderRequest?.status || '')) {
        query = query.eq('status', 'modified');
      }

      const { data, error } = await query
        .select('*')
        .maybeSingle();

      if (error) throw error;

      if (!data) {
        console.warn('Supabase order update: aucune ligne mise à jour pour id =', liveRequestId);
        alert(`Supabase n'a mis à jour aucune commande.\nLa demande a peut-être déjà changé de statut côté restaurant.\nID utilisé : ${liveRequestId}`);
        await syncLastOrderRequestFromSource();
        return null;
      }

      const syncedRequest = mapLiveOrderRowToRequest(data) || updatedOrderRequest;
      const mergedRequest = {
        ...updatedOrderRequest,
        ...syncedRequest,
        liveRequestId: syncedRequest.liveRequestId || liveRequestId,
        requestId: syncedRequest.requestId || liveRequestId,
        status: syncedRequest.status || updatedOrderRequest.status,
        updatedAt: syncedRequest.updatedAt || updatedOrderRequest.updatedAt,
        clientDecision: updatedOrderRequest.clientDecision || '',
        clientDecisionAt: updatedOrderRequest.clientDecisionAt || '',
        restaurantResponse: {
          ...(syncedRequest.restaurantResponse || {}),
          ...(updatedOrderRequest.restaurantResponse || {})
        }
      };

      const existingRequests = readOrderRequestsFromStorage();
      const withoutDuplicate = existingRequests.filter(
        (entry) => String(entry?.requestId) !== String(mergedRequest.requestId)
      );
      const updatedRequests = [mergedRequest, ...withoutDuplicate].slice(0, 20);

      writeOrderRequestsToStorage(updatedRequests);
      localStorage.setItem(getLastOrderStorageKey(), JSON.stringify(mergedRequest));

      return mergedRequest;
    } catch (error) {
      console.error('Supabase order update error:', error);
      alert(`Erreur Supabase update commande : ${error?.message || error}`);
      return null;
    }
  }

  const existingRequests = readOrderRequestsFromStorage();
  const updatedRequests = existingRequests.map((entry) =>
    String(entry?.requestId) === String(updatedOrderRequest?.requestId)
      ? {
          ...entry,
          ...updatedOrderRequest,
          restaurantResponse: {
            ...(entry?.restaurantResponse || {}),
            ...(updatedOrderRequest?.restaurantResponse || {})
          }
        }
      : entry
  );

  writeOrderRequestsToStorage(updatedRequests);
  localStorage.setItem(getLastOrderStorageKey(), JSON.stringify(updatedOrderRequest));

  return updatedOrderRequest;
}

window.acceptLastOrderModification = async function() {
  const orderRequest = getLastOrderRequest();
  if (!orderRequest || (orderRequest.status || 'sent') !== 'modified') return;

  const hadOpenHistoryModal = Boolean(document.getElementById('client-history-modal'));
  const nowIso = new Date().toISOString();
  const updatedOrderRequest = {
    ...orderRequest,
    status: 'accepted_by_client',
    updatedAt: nowIso,
    clientDecisionAt: nowIso,
    clientDecision: 'accepted',
    restaurantResponse: {
      ...(orderRequest.restaurantResponse || {}),
      clientDecision: 'accepted',
      clientDecisionAt: nowIso
    }
  };

  const syncedOrderRequest = await updateStoredOrderRequest(updatedOrderRequest);

  if (syncedOrderRequest) {
    await syncLastOrderRequestFromSource();
    await refreshClientRequestCards();

    if (hadOpenHistoryModal) {
      await openCurrentOrderModal();
    }

    setTimeout(() => {
      const orderCard = document.getElementById('client-order-card');
      if (orderCard) {
        orderCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 80);
  }
};

window.rejectLastOrderModification = async function() {

  if (!orderRequest || (orderRequest.status || 'sent') !== 'modified') return;

  const hadOpenHistoryModal = Boolean(document.getElementById('client-history-modal'));
  const nowIso = new Date().toISOString();
  const updatedOrderRequest = {

    status: 'rejected_by_client',

      await openCurrentOrderModal();
    }

    setTimeout(() => {

  }

async function openCurrentOrderModal() {
  const tHistory = getClientHistoryTexts();

  if (LIVE_REQUESTS_ENABLED) {
    await syncLastOrderRequestFromSource();

    if (clientOrderSyncUnavailable) {
      openClientHistoryModal(tHistory.currentOrder, renderClientSyncUnavailableCard('order'));
      return;
    }
  }

  openClientHistoryModal(tHistory.currentOrder, renderLastOrderRequestCard());
}

async function openLastOrdersModal() {
  const tHistory = getClientHistoryTexts();

  const orders = (await readOrderRequestsFromSource())
    .filter((orderRequest) =>
      orderRequest &&
      orderRequest.order &&
      orderRequest.customer &&
      isFinalClientOrderStatus(orderRequest.status || 'pending')
    )
    .slice(0, 5);

  const contentHtml = orders.length
    ? orders.map((orderRequest) => renderClientOrderHistoryItem(orderRequest)).join('')
    : `<div class="text-sm text-cream/70">${renderClientHistoryEmptyText()}</div>`;

  openClientHistoryModal(tHistory.lastOrders, contentHtml);
}

async function openCurrentBookingModal() {
  const tHistory = getClientHistoryTexts();

  if (LIVE_REQUESTS_ENABLED) {
    await readBookingRequestsFromStorage();

    if (clientBookingSyncUnavailable) {
      openClientHistoryModal(tHistory.currentBooking, renderClientSyncUnavailableCard('booking'));
      return;
    }
  }

  openClientHistoryModal(tHistory.currentBooking, renderLastBookingRequestCard());
}

async function openLastBookingsModal() {
  const tHistory = getClientHistoryTexts();

  let bookings = (await readBookingRequestsFromStorage())
    .filter((bookingRequest) =>
      bookingRequest &&
      bookingRequest.booking &&
      bookingRequest.customer &&
      isFinalClientBookingStatus(bookingRequest.status || 'pending')
    );

  const lastBooking = getLastBookingRequest();

  if (!LIVE_REQUESTS_ENABLED && lastBooking && isFinalClientBookingStatus(lastBooking.status || 'pending')) {
    bookings = [
      lastBooking,
      ...bookings.filter((bookingRequest) => String(bookingRequest?.requestId) !== String(lastBooking.requestId))
    ];
  }

  bookings = bookings.slice(0, 5);

  const contentHtml = bookings.length
    ? bookings.map((bookingRequest) => renderClientBookingHistoryItem(bookingRequest)).join('')
    : `<div class="text-sm text-cream/70">${renderClientHistoryEmptyText()}</div>`;

  openClientHistoryModal(tHistory.lastBookings, contentHtml);
}

function renderClientOrderHistoryItem(orderRequest) {
  const status = orderRequest.status || 'pending';
  const orderItems = Array.isArray(orderRequest.order?.items) ? orderRequest.order.items : [];
  const totalAmount = Number(orderRequest.order?.totalAmount || 0);
  const statusLabel = getOrderStatusLabel(status);

  const statusClass = isFinalClientOrderStatus(status)
    ? (
        status === 'served'
          ? 'text-emerald-200'
          : status === 'service_unknown_no_action'
            ? 'text-gold'
            : 'text-red-200'
      )
    : (
        status === 'confirmed' || status === 'accepted_by_client'
          ? 'text-emerald-200'
          : status === 'processing' || status === 'modified'
            ? 'text-sky-100'
            : 'text-amber-100'
      );

  return `
    <div class="rounded-2xl border border-gold/20 bg-black/20 p-4">
      <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">
        <div>
          <div class="text-sm font-semibold ${statusClass}">${escapeBookingHtml(statusLabel)}</div>
          <div class="mt-1 text-xs text-cream/65">
            ${escapeBookingHtml(formatBookingDateForDisplay(orderRequest.order?.date || ''))}
            · ${escapeBookingHtml(orderRequest.order?.time || '-')}
          </div>
        </div>

        ${totalAmount ? `
          <div class="text-sm font-bold text-gold">
            ${totalAmount.toFixed(2).replace('.', ',')} €
          </div>
        ` : ''}
      </div>

      ${orderItems.length ? `
        <div class="mt-3 text-sm text-cream/80">
          ${escapeBookingHtml(orderItems.map((item) => `${item.name} x${item.quantity}`).join(', '))}
        </div>
      ` : ''}
    </div>
  `;
}

function renderClientBookingHistoryItem(bookingRequest) {
  const status = bookingRequest.status || 'pending';
  const statusLabel = getBookingStatusLabel(status);

  const statusClass = isFinalClientBookingStatus(status)

        status === 'arrived'

            ? 'text-gold'

          ? 'text-emerald-200'

            ? 'text-sky-100'

    <div class="rounded-2xl border border-gold/20 bg-black/20 p-4">
      <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">

          <div class="text-sm font-semibold ${statusClass}">${escapeBookingHtml(statusLabel)}</div>

  const storedOrders = readOrderRequestsFromStorage();

function hasClientBookingHistory() {
  const lastBooking = getLastBookingRequest();

  let storedBookings = [];

  try {
    const raw = localStorage.getItem(getBookingStorageKey());
    const parsed = raw ? JSON.parse(raw) : [];
    storedBookings = Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    storedBookings = [];
  }

  return Boolean(lastBooking) || storedBookings.length > 0;
}

function getClientOrderTrackingSnapshot() {
  const orderRequest = getLastOrderRequest();

  if (!orderRequest || !orderRequest.requestId) {
    return null;
  }

  return {
    requestId: String(orderRequest.requestId),
    status: orderRequest.status || 'pending'
  };
}

function shouldFocusClientOrderCardAfterRefresh(previousSnapshot, nextSnapshot) {
  if (!orderMode) return false;
  if (!previousSnapshot || !nextSnapshot) return false;
  if (previousSnapshot.requestId !== nextSnapshot.requestId) return false;
  if (previousSnapshot.status === nextSnapshot.status) return false;
  if (isFinalClientOrderStatus(nextSnapshot.status)) return false;

  return true;
}

function focusClientOrderCardAfterRefresh() {
  requestAnimationFrame(() => {
    const orderCard = document.getElementById('client-order-card');

    if (orderCard) {
      orderCard.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
  });
}

async function refreshClientRequestCards() {
  const previousOrderSnapshot = getClientOrderTrackingSnapshot();

  if (LIVE_REQUESTS_ENABLED) {
    try {
      await syncLastOrderRequestFromSource();
      await readBookingRequestsFromStorage();
    } catch (error) {
      console.error('Supabase client cards refresh error:', error);
      clientOrderSyncUnavailable = true;
      clientBookingSyncUnavailable = true;
    }
  }

  const nextOrderSnapshot = getClientOrderTrackingSnapshot();
  const shouldFocusOrderCard = shouldFocusClientOrderCardAfterRefresh(previousOrderSnapshot, nextOrderSnapshot);

  const orderSlot = document.getElementById('client-order-card-slot');
  const bookingSlot = document.getElementById('client-booking-card-slot');

  if (orderSlot) {
    orderSlot.innerHTML = clientOrderSyncUnavailable
      ? renderClientSyncUnavailableCard('order')
      : renderLastOrderRequestCard();
  }

  if (bookingSlot) {
    bookingSlot.innerHTML = clientBookingSyncUnavailable
      ? renderClientSyncUnavailableCard('booking')
      : renderLastBookingRequestCard();
  }

  if (shouldFocusOrderCard) {
    focusClientOrderCardAfterRefresh();
  }

  if (window.lucide) {
    requestAnimationFrame(() => {
      lucide.createIcons();
    });
  }
}

window.manualRefreshClientRequests = async function() {
  try {
    if (LIVE_REQUESTS_ENABLED) {
      bookingRequests = await fetchLiveRequestsByType('booking');
      await fetchLiveRequestsByType('order');
    } else {
      if (typeof readBookingRequestsFromStorage === 'function') {
        bookingRequests = await readBookingRequestsFromStorage();
      }

      readOrderRequestsFromStorage();
    }
  } catch (error) {
    console.error('Manual client request refresh error:', error);

    if (LIVE_REQUESTS_ENABLED) {
      clientOrderSyncUnavailable = true;
      clientBookingSyncUnavailable = true;
    }
  }

  await refreshClientRequestCards();
};

async function fetchLiveMenuMeta() {
  if (!LIVE_RESTAURANT_ID) return null;

  const { data, error } = await supabaseClient
    .from('restaurant_menus')
    .select('menu_version, updated_at')
    .eq('restaurant_id', LIVE_RESTAURANT_ID)
    .maybeSingle();

  if (error) {
    throw error;
  }

  return data;
}

function stopClientRequestAutoRefresh() {
  if (clientRequestAutoRefreshTimer) {
    clearInterval(clientRequestAutoRefreshTimer);
    clientRequestAutoRefreshTimer = null;
  }
}

function stopClientMenuAutoRefresh() {
  if (clientMenuAutoRefreshTimer) {
    clearInterval(clientMenuAutoRefreshTimer);
    clientMenuAutoRefreshTimer = null;
  }
}

function startClientRequestAutoRefresh() {
  stopClientRequestAutoRefresh();

  if (document.hidden) return;
  if (!orderMode && !bookingMode) return;

  const shouldKeepRefreshing =
    hasPendingClientBookingRequest() ||
    hasPendingClientOrderRequest() ||
    clientOrderSyncUnavailable ||
    clientBookingSyncUnavailable;

  if (!shouldKeepRefreshing) return;

  clientRequestAutoRefreshTimer = setInterval(async () => {
    if (bookingMode) {
      bookingRequests = LIVE_REQUESTS_ENABLED
        ? await fetchLiveRequestsByType('booking')
        : (typeof readBookingRequestsFromStorage === 'function'
            ? await readBookingRequestsFromStorage()
            : bookingRequests);
    }

    if (orderMode) {
      if (LIVE_REQUESTS_ENABLED) {
        await fetchLiveRequestsByType('order');
      } else {
        readOrderRequestsFromStorage();
      }
    }

    await refreshClientRequestCards();
  }, 30000);
}

function startClientMenuAutoRefresh() {
  stopClientMenuAutoRefresh();

  if (document.hidden) return;
  if (!LIVE_RESTAURANT_ID) return;

  clientMenuAutoRefreshTimer = setInterval(async () => {
    try {
      const liveMenuMeta = await fetchLiveMenuMeta();
      if (!liveMenuMeta) return;

      const nextMenuVersion = liveMenuMeta.menu_version ?? null;
      const nextUpdatedAt = liveMenuMeta.updated_at ?? null;

      const versionChanged = String(nextMenuVersion ?? '') !== String(menuMeta.menuVersion ?? '');
      const updatedAtChanged = String(nextUpdatedAt ?? '') !== String(menuMeta.updatedAt ?? '');

      if (!versionChanged && !updatedAtChanged) {
        return;
      }

      const currentScrollY = window.scrollY;

      await loadRestaurantData();
      renderMenu();
      refreshClientRequestCards();

      requestAnimationFrame(() => {
        window.scrollTo({ top: currentScrollY, behavior: 'auto' });
      });
    } catch (error) {
      console.error('Erreur refresh menu live client :', error);
    }
  }, 30000);
}

function setupClientRequestAutoRefresh() {
  refreshClientRequestCards()
    .finally(() => {
      startClientRequestAutoRefresh();
      startClientMenuAutoRefresh();
    });
}

function addToCart(itemId) {
  if (!siteConfig.modules?.ordering) {
    return;

  const existingItem = cart.find(item => item.id === itemId);

  if (existingItem) {
    existingItem.quantity += 1;
  } else {
    cart.push({ id: itemId, quantity: 1 });
  }

  renderMenu();
}

function getMissingOrderFieldFeedbackKey({ name, phone, date, time }) {
  const missingName = !String(name || '').trim();
  const missingPhone = !String(phone || '').trim();
  const missingDate = !String(date || '').trim();
  const missingTime = !String(time || '').trim();

  if (missingName && missingPhone) return 'namePhoneRequired';
  if (missingName) return 'nameRequired';
  if (missingPhone) return 'phoneRequired';
  if (missingDate || missingTime) return 'dateTimeRequired';

async function validateOrderReview() {
  if (!siteConfig.modules?.ordering) {
    orderReviewOpen = false;
    renderMenu();
    return;
  }

  orderForm.name = (orderForm.name || '').trim();
  orderForm.phone = (orderForm.phone || '').trim();
  orderForm.date = (orderForm.date || '').trim();
  orderForm.time = (orderForm.time || '').trim();

  if (!cart.length) {
    setOrderFeedback('error', 'cartEmpty');
    orderReviewOpen = false;
    renderMenu();
    return;
  }

  if (!orderForm.name || !orderForm.phone || !orderForm.date || !orderForm.time) {
    setOrderFeedback(
      'error',
      getMissingOrderFieldFeedbackKey({
        name: orderForm.name,
        phone: orderForm.phone,
        date: orderForm.date,
        time: orderForm.time
      })
    );
    renderMenu();
    return;
  }

  const normalizedPhone = orderForm.phone.replace(/[^\d+]/g, '');
  const digitCount = normalizedPhone.replace(/\D/g, '').length;
  const phonePattern = /^\+?[0-9]{8,15}$/;

  if (!phonePattern.test(normalizedPhone) || digitCount < 8) {
    setOrderFeedback('error', 'invalidPhone');
    renderMenu();
    return;
  }

  orderForm.phone = normalizedPhone;

  const orderItems = cart.map((cartItem) => {
    const sourceItem = Object.values(menuData).flat().find((menuItem) => menuItem.id === cartItem.id);
    const itemLabel = sourceItem?.adminName || sourceItem?.name || cartItem.id;

    const numericPrice = sourceItem && sourceItem.price
      ? parseFloat(String(sourceItem.price).replace('€', '').replace(',', '.').trim())
      : NaN;

    return {
      id: cartItem.id,
      name: itemLabel,
      quantity: cartItem.quantity,
      unitPrice: Number.isNaN(numericPrice) ? null : numericPrice,
      lineTotal: Number.isNaN(numericPrice) ? null : Number((numericPrice * cartItem.quantity).toFixed(2))
    };
  });

  const totalAmount = orderItems.reduce((sum, item) => sum + (item.lineTotal || 0), 0);
  const nowIso = new Date().toISOString();

  const orderRequest = {
    restaurantId: siteConfig?.identity?.id || LIVE_RESTAURANT_ID || '',
    requestId: `CMD-${Date.now()}`,
    requestType: 'order',
    createdAt: nowIso,
    updatedAt: nowIso,
    status: 'pending',
    customer: {
      name: orderForm.name,
      phone: orderForm.phone,
      language: currentLang
    },
    order: {
      date: orderForm.date,
      time: orderForm.time,
      note: orderForm.note || '',
      items: orderItems,
      totalAmount: Number(totalAmount.toFixed(2))
    },
    restaurantResponse: {
      reason: '',
      message: '',
      updatedBy: ''
    }
  };

  try {
    await saveOrderRequestLocally(orderRequest);
  } catch (error) {
    console.error('TapCarta order Supabase insert error:', error);
    setOrderFeedback('error', 'sendError');
    renderMenu();
    return;
  }

  setOrderFeedback('success', 'orderSent');

  cart = [];
  cartPanelOpen = false;
  orderReviewOpen = false;

  orderForm = {
    name: '',
    phone: '',
    date: '',
    time: '',
    note: ''
  };

  renderMenu();
}

function removeFromCart(itemId) {
  if (!siteConfig.modules?.ordering) {
    return;
  }

  const existingItem = cart.find(item => item.id === itemId);

  if (!existingItem) return;

  existingItem.quantity -= 1;

  if (existingItem.quantity <= 0) {
    cart = cart.filter(item => item.id !== itemId);
  }

  if (!cart.length) {
    orderReviewOpen = false;
  }

  renderMenu();
}

function getDefaultOrderDateTime() {
  const now = new Date();
  const target = new Date(now.getTime() + 60 * 60 * 1000);

  const minutes = target.getMinutes();
  const roundedMinutes = Math.ceil(minutes / 10) * 10;

  if (roundedMinutes === 60) {
    target.setHours(target.getHours() + 1);
    target.setMinutes(0, 0, 0);
  } else {
    target.setMinutes(roundedMinutes, 0, 0);
  }

  const year = target.getFullYear();
  const month = String(target.getMonth() + 1).padStart(2, '0');
  const day = String(target.getDate()).padStart(2, '0');
  const hours = String(target.getHours()).padStart(2, '0');
  const finalMinutes = String(target.getMinutes()).padStart(2, '0');

  return {
    date: `${year}-${month}-${day}`,
    time: `${hours}:${finalMinutes}`
  };
}

function renderMenuItem(item, t) {

function calculateCartSummary() {
  const allMenuItems = Object.values(menuData).flat();

  const itemCount = cart.reduce((total, item) => total + item.quantity, 0);

  const totalAmount = cart.reduce((sum, cartItem) => {
    const sourceItem = allMenuItems.find(menuItem => menuItem.id === cartItem.id);
    return sum + (getNumericMenuItemPrice(sourceItem) * cartItem.quantity);

  return {
    itemCount,
    totalAmount,
    totalFormatted: `${totalAmount.toFixed(2).replace('.', ',')} €`
  };

function ensureFreshHtmlVersion() {
  try {
    const lastLoadedVersion = localStorage.getItem(VERSION_STORAGE_KEY);
    const currentUrl = new URL(window.location.href);

    if (currentUrl.searchParams.has('v')) {
      currentUrl.searchParams.delete('v');
      window.history.replaceState({}, document.title, currentUrl.toString());
    }

    if (lastLoadedVersion !== APP_VERSION) {
      localStorage.setItem(VERSION_STORAGE_KEY, APP_VERSION);
    }
  } catch (err) {
    console.warn('Version refresh check failed:', err);
  }

  return false;
}

let hasReloadedForNewSW = false;

async function registerFreshServiceWorker() {
  if (!('serviceWorker' in navigator)) return;

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (hasReloadedForNewSW) return;
    hasReloadedForNewSW = true;
    window.location.reload();
  });

  try {
    const registration = await navigator.serviceWorker.register(SW_URL, {
      scope: `${BASE_PATH}/`,
      updateViaCache: 'none'
    });

    if (registration) {
      await registration.update();

      if (registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }

      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        if (!newWorker) return;

        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }
  } catch (err) {
    console.error('SW registration error:', err);
  }
}

document.addEventListener('DOMContentLoaded', async () => {
const manifestLink = document.getElementById('manifest-link');
const appleTouchIconLink = document.getElementById('apple-touch-icon-link');
const faviconLink = document.getElementById('favicon-link');
const tapCartaPublicLogo = document.getElementById('tapcarta-public-logo');

if (manifestLink) {
  manifestLink.href = MANIFEST_URL;
}

if (appleTouchIconLink) {
  appleTouchIconLink.href = ICON_192_URL;
}

if (faviconLink) {
  faviconLink.href = FAVICON_URL;
}

if (tapCartaPublicLogo) {
  tapCartaPublicLogo.src = TAPCARTA_PUBLIC_LOGO_URL;
}

updateTapCartaPublicSignature();

  const reloadingForFreshVersion = ensureFreshHtmlVersion();
  if (reloadingForFreshVersion) return;

  await registerFreshServiceWorker();

  try {
    await loadRestaurantData();
  } catch (error) {
    console.error('Restaurant data loading error:', error);
  }

  renderMenu();

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      stopClientRequestAutoRefresh();
      return;
    }

    refreshClientRequestCards();
    startClientRequestAutoRefresh();
  });

  window.addEventListener('storage', (event) => {
    if (!event.key) return;

    if (
      event.key === getOrderStorageKey() ||
      event.key === getLastOrderStorageKey() ||
      event.key === getBookingStorageKey() ||
      event.key === getLastBookingStorageKey()
    ) {
      refreshClientRequestCards();
      startClientRequestAutoRefresh();
    }
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {

      if (!supportedLangs.includes(lang)) return;

      currentLang = lang;

  });
});
