async function fetchJsonFile(path) {
  const response = await fetch(`${path}?v=${APP_VERSION}`, { cache: 'no-store' });

  if (!response.ok) {
    throw new Error(`Impossible de charger ${path}`);
  }

  return response.json();
}

async function loadActiveRestaurantData() {
  const restaurantsIndex = await fetchJsonFile('./restaurants/index.json');

  const restaurantsList = Array.isArray(restaurantsIndex)
    ? restaurantsIndex
    : Array.isArray(restaurantsIndex.restaurants)
      ? restaurantsIndex.restaurants
      : [];

  const activeRestaurant = restaurantsList.find(item => item.status === 'active');

  if (!activeRestaurant || !activeRestaurant.id) {
    throw new Error('Aucun établissement actif trouvé.');
  }

  const restaurantFilePath = activeRestaurant.file
    ? `./${activeRestaurant.file.replace(/^\.?\//, '')}`
    : `./restaurants/${activeRestaurant.id}.json`;

  const restaurantData = await fetchJsonFile(restaurantFilePath);

  if (restaurantData?.identity?.id) {
    try {
      const { data: liveMenuRow, error: liveMenuError } = await supabaseClient
        .from('restaurant_menus')
        .select('menu_json, menu_version, updated_at')
        .eq('restaurant_id', restaurantData.identity.id)
        .maybeSingle();

      if (liveMenuError) {
        throw liveMenuError;
      }

      if (liveMenuRow?.menu_json && typeof liveMenuRow.menu_json === 'object') {
        restaurantData.menu = {
          ...liveMenuRow.menu_json,
          menuVersion:
            liveMenuRow.menu_version ??
            liveMenuRow.menu_json?.menuVersion ??
            restaurantData?.menu?.menuVersion ??
            null,
          updatedAt:
            liveMenuRow.updated_at ??
            liveMenuRow.menu_json?.updatedAt ??
            restaurantData?.menu?.updatedAt ??
            null
        };
      }
    } catch (error) {
      console.error('Erreur lecture menu live Supabase côté restaurant :', error);
    }
  }

  siteConfig.restaurantName =
    restaurantData?.identity?.name ||
    restaurantData?.name ||
    activeRestaurant.name ||
    siteConfig.restaurantName;

const restaurantLifecycle =
  restaurantData?.status?.lifecycle ||
  restaurantData?.identity?.status ||
  'active';

const isRestaurantActive = restaurantLifecycle === 'active';

siteConfig.modules = {
  ordering: isRestaurantActive && restaurantData?.modules?.ordering !== false,
  booking: isRestaurantActive && restaurantData?.modules?.booking !== false,
  googleReviews: isRestaurantActive && restaurantData?.modules?.googleReviews !== false,
  whatsapp: isRestaurantActive && restaurantData?.modules?.whatsapp !== false,
  web: isRestaurantActive && restaurantData?.modules?.web === true
};

siteConfig.orderReservationOptionEnabled =
  siteConfig.modules.ordering || siteConfig.modules.booking;

const resolvedClientMenuUrl =
  restaurantData?.technical?.clientMenuUrl ||
  restaurantData?.portal?.portalPaths?.publicPage ||
  restaurantData?.links?.clientMenuUrl ||
  restaurantData?.links?.publicPage ||
  (restaurantData?.identity?.id === 'tapcarta-demo'
    ? 'https://fjmenu.github.io/TapCarta-Standard-b-ta-test/'
    : siteConfig.clientMenuUrl);

const resolvedQrMenuUrl =
  restaurantData?.technical?.qrMenuUrl ||
  restaurantData?.links?.qrMenuUrl ||
  siteConfig.qrMenuUrl;

const resolvedExperienceUrl =
  restaurantData?.technical?.experienceUrl ||
  restaurantData?.links?.experienceUrl ||
  siteConfig.experienceUrl;

const resolvedActivationRequestUrl =
  restaurantData?.technical?.activationRequestUrl ||
  restaurantData?.links?.activationRequestUrl ||
  siteConfig.activationRequestUrl;

const resolvedReviewReadUrl =
  restaurantData?.technical?.reviewReadUrl ||
  restaurantData?.links?.reviewReadUrl ||
  siteConfig.reviewReadUrl;

const resolvedReviewWriteUrl =
  restaurantData?.technical?.reviewWriteUrl ||
  restaurantData?.links?.reviewWriteUrl ||
  siteConfig.reviewWriteUrl;

siteConfig.clientMenuUrl = resolvedClientMenuUrl;
siteConfig.qrMenuUrl = resolvedQrMenuUrl;
siteConfig.experienceUrl = resolvedExperienceUrl;
siteConfig.activationRequestUrl = resolvedActivationRequestUrl;
siteConfig.reviewReadUrl = resolvedReviewReadUrl;
siteConfig.reviewWriteUrl = resolvedReviewWriteUrl;

activeRestaurantData = restaurantData;
  return restaurantData;
}

const supportedLangs = ['fr', 'es', 'en', 'nl'];
const LANGUAGE_STORAGE_KEY = 'tapcarta-selected-language';

function detectLanguage() {
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  if (urlLang && supportedLangs.includes(urlLang)) {
    localStorage.setItem(LANGUAGE_STORAGE_KEY, urlLang);
    return urlLang;
  }

  const savedLang = localStorage.getItem(LANGUAGE_STORAGE_KEY);
  if (savedLang && supportedLangs.includes(savedLang)) {
    return savedLang;
  }

  const browserLang = (navigator.language || navigator.userLanguage || 'es').substring(0, 2).toLowerCase();
  return supportedLangs.includes(browserLang) ? browserLang : 'es';
}

    function updateInstallUI() {
      const installBtn = document.getElementById('install-app-btn');
      const iosHelp = document.getElementById('ios-install-help');
      const installTexts = getInstallAppTexts();

      if (!installBtn) return;

      const buttonSpan = installBtn.querySelector('span');
      if (buttonSpan) {
        buttonSpan.textContent = installTexts.button;
      }

      if (isInStandaloneMode()) {
        installBtn.hidden = true;
        if (iosHelp) {
          iosHelp.hidden = true;
          iosHelp.innerHTML = '';
        }
        return;
      }

      if (isSamsungInternet() || deferredInstallPrompt || isIos() || isAndroid()) {
        installBtn.hidden = false;
      } else {
        installBtn.hidden = true;
      }

      if (iosHelp) {
        iosHelp.hidden = true;
      }
    }

    function showInstallToast() {
      if (installToastAlreadyShown) return;

      const toast = document.getElementById('install-toast');
      const title = document.getElementById('install-toast-title');
      const text = document.getElementById('install-toast-text');
      const t = translations[currentLang];

      if (!toast || !title || !text) return;

      installToastAlreadyShown = true;
      title.textContent = t.installToastTitle;
      text.textContent = t.installToastText;
      toast.classList.add('show');

      if (window.lucide) {
        requestAnimationFrame(() => {
          lucide.createIcons();
        });
      }

      clearTimeout(installToastTimeout);
      installToastTimeout = setTimeout(() => {
        toast.classList.remove('show');
        installToastAlreadyShown = false;
      }, 3200);
    }

    async function handleInstallClick() {
      const iosHelp = document.getElementById('ios-install-help');
      const installTexts = getInstallAppTexts();

      const toggleHelp = (html) => {
        if (!iosHelp) return;

        if (!iosHelp.hidden) {
          clearTimeout(installHelpTimeout);
          iosHelp.hidden = true;
          return;
        }

        clearTimeout(installHelpTimeout);
        iosHelp.hidden = false;
        iosHelp.innerHTML = html;
        iosHelp.scrollIntoView({ behavior: 'smooth', block: 'center' });

        installHelpTimeout = setTimeout(() => {
          iosHelp.hidden = true;
        }, 15000);
      };

      if (isSamsungInternet()) {
        toggleHelp(installTexts.samsungHelp);
        return;
      }

      if (deferredInstallPrompt) {
        installToastAlreadyShown = false;
        deferredInstallPrompt.prompt();

        try {
          const choiceResult = await deferredInstallPrompt.userChoice;

          if (choiceResult && choiceResult.outcome === 'accepted') {
            clearTimeout(installFallbackTimeout);
            installFallbackTimeout = setTimeout(() => {
              if (isInStandaloneMode()) {
                showInstallToast();
              }
            }, 1200);
          } else {
            if (isAndroid()) {
              toggleHelp(installTexts.androidHelp);
            }
          }
        } catch (_) {
          if (isAndroid()) {
            toggleHelp(installTexts.androidHelp);
          }
        }

        deferredInstallPrompt = null;
        updateInstallUI();
        return;
      }

      if (isIos() && !isInStandaloneMode()) {
        toggleHelp(installTexts.iosHelp);
        return;
      }

      if (isAndroid() && !isInStandaloneMode()) {
        toggleHelp(installTexts.androidHelp);
      }
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;

      if (!isSamsungInternet()) {
        updateInstallUI();
      }
    });

    window.addEventListener('appinstalled', () => {
      clearTimeout(installFallbackTimeout);
      deferredInstallPrompt = null;
      updateInstallUI();
      showInstallToast();
    });

  if (!cart.length) {

function removeFromCart(itemId) {
  const existingItem = cart.find(item => item.id === itemId);

  if (!existingItem) return;

  existingItem.quantity -= 1;

  if (existingItem.quantity <= 0) {
    cart = cart.filter(item => item.id !== itemId);

  if (!cart.length) {

function getDefaultOrderDateTime() {
  const now = new Date();
  const target = new Date(now.getTime() + 60 * 60 * 1000);

  const minutes = target.getMinutes();
  const roundedMinutes = Math.ceil(minutes / 10) * 10;

  if (roundedMinutes === 60) {
    target.setHours(target.getHours() + 1);
    target.setMinutes(0, 0, 0);
  } else {
    target.setMinutes(roundedMinutes, 0, 0);
  }

  const year = target.getFullYear();
  const month = String(target.getMonth() + 1).padStart(2, '0');
  const day = String(target.getDate()).padStart(2, '0');
  const hours = String(target.getHours()).padStart(2, '0');
  const finalMinutes = String(target.getMinutes()).padStart(2, '0');

  return {
    date: `${year}-${month}-${day}`,
    time: `${hours}:${finalMinutes}`
  };
}

      },
      order: {

        time: row.booking_time ? String(row.booking_time).slice(0, 5) : '',
        note: row.note || '',
        items: orderItems,
        totalAmount: Number(totalAmount.toFixed(2))
      },
      restaurantResponse,
      ...finalTimestamps,
      historyDeleted: restaurantResponse.historyDeleted === true,
      historyUpdatedAt: restaurantResponse.historyUpdatedAt || finalTimestamps.historyUpdatedAt
    };
  }

  try {
    const [{ data: bookingsData, error: bookingsError }, { data: ordersData, error: ordersError }] = await Promise.all([
      supabaseClient
        .from('requests')
        .select('*')
        .eq('restaurant_id', activeRestaurantId)
        .eq('type', 'booking')
        .order('created_at', { ascending: false }),
      supabaseClient
        .from('requests')
        .select('*')
        .eq('restaurant_id', activeRestaurantId)
        .eq('type', 'order')
        .order('created_at', { ascending: false })
    ]);

    if (bookingsError) throw bookingsError;
    if (ordersError) throw ordersError;

    const liveBookings = Array.isArray(bookingsData)
      ? bookingsData.map(mapLiveBookingRowToRequest).filter(Boolean)

    const liveOrders = Array.isArray(ordersData)

    window.tapCartaRestaurantLiveRequestsCache = {

  } catch (error) {
    window.tapCartaRestaurantLiveRequestsCache = {

function loadRestaurantRequests() {
  const historyRetentionMs = 30 * 24 * 60 * 60 * 1000;
  const activeRestaurantId =
    activeRestaurantData?.identity?.id ||
    activeRestaurantData?.id ||
    siteConfig?.identity?.id ||
    '';

  const bookingActiveStatuses = [
    'pending',
    'processing',
    'modified',
    'accepted_by_client',
    'rejected_by_client',
    'confirmed'
  ];

  const orderActiveStatuses = [
    'pending',
    'sent',
    'processing',
    'modified',
    'accepted_by_client',
    'rejected_by_client',
    'confirmed'
  ];

  function getHistoryReferenceTimestamp(item) {
    const rawValue =
      item?.historyUpdatedAt ||
      item?.updatedAt ||
      item?.confirmedAt ||
      item?.cancelledAt ||
      item?.servedAt ||
      item?.arrivedAt ||
      item?.notServedAt ||
      item?.notArrivedAt ||
      item?.autoClosedAt ||
      item?.createdAt;

    const parsedValue = rawValue ? new Date(rawValue).getTime() : NaN;
    return Number.isFinite(parsedValue) ? parsedValue : Date.now();
  }

  function isRequestStillActive(item, activeStatuses) {
    if (!item) return false;
    return Array.isArray(activeStatuses) && activeStatuses.includes(item.status);
  }

  function shouldHideExpiredHistory(item, activeStatuses) {
    if (!item) return true;
    if (item.historyDeleted === true) return true;
    if (isRequestStillActive(item, activeStatuses)) return false;
    return (Date.now() - getHistoryReferenceTimestamp(item)) > historyRetentionMs;
  }

  function normalizeRequestItem(item, requestType, activeStatuses, typeLabel) {
    const isStillActive = isRequestStillActive(item, activeStatuses);

    return {
      id: item.requestId || `${requestType}_${Date.now()}`,
      type: typeLabel,
      client: item.customer?.name || 'Client',
      createdAt: item.createdAt ? new Date(item.createdAt).getTime() : Date.now(),
      status: isStillActive ? t.restaurantStatusNew : t.restaurantStatusProcessed,
      treated: !isStillActive,
      sourceRequest: item
    };
  }

  try {
    const liveCache = window.tapCartaRestaurantLiveRequestsCache || {};
    const safeBookings = Array.isArray(liveCache.bookings) ? liveCache.bookings : [];
    const safeOrders = Array.isArray(liveCache.orders) ? liveCache.orders : [];

    const bookings = safeBookings
      .filter(
        (item) =>
          item &&
          item.requestType === 'booking' &&
          String(item.restaurantId || '') === String(activeRestaurantId) &&
          !shouldHideExpiredHistory(item, bookingActiveStatuses)
      )
      .map((item) => normalizeRequestItem(item, 'booking', bookingActiveStatuses, t.restaurantTypeBooking));

    const orders = safeOrders
      .filter(
        (item) =>
          item &&
          item.requestType === 'order' &&
          String(item.restaurantId || '') === String(activeRestaurantId) &&
          !shouldHideExpiredHistory(item, orderActiveStatuses)
      )
      .map((item) => normalizeRequestItem(item, 'order', orderActiveStatuses, t.restaurantTypeOrder));

    return [...orders, ...bookings].sort((a, b) => b.createdAt - a.createdAt);
  } catch (error) {
    console.warn('TapCarta Restaurant: impossible de lire les demandes live Supabase', error);
    return [];
  }
}

async function unlockRestaurantNotificationSound() {
  const audioContext = getRestaurantAudioContext();

  if (!audioContext) return false;

  try {
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }

    window.tapCartaRestaurantAudioState.unlocked = audioContext.state === 'running';
    return window.tapCartaRestaurantAudioState.unlocked;
  } catch (e) {

  }
}

function playRestaurantNotificationTone() {
  const audioContext = getRestaurantAudioContext();

  if (!audioContext || audioContext.state !== 'running') {
    return false;
  }

  try {
    const now = audioContext.currentTime;

    const masterGain = audioContext.createGain();
    masterGain.gain.setValueAtTime(0.001, now);
    masterGain.gain.linearRampToValueAtTime(0.36, now + 0.03);
    masterGain.gain.linearRampToValueAtTime(0.36, now + 2.75);
    masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 3.05);
    masterGain.connect(audioContext.destination);

    const beepPattern = [
      { start: 0.00, duration: 0.22, frequency: 950 },
      { start: 0.32, duration: 0.22, frequency: 1320 },
      { start: 0.64, duration: 0.22, frequency: 950 },
      { start: 1.05, duration: 0.32, frequency: 1500 },
      { start: 1.52, duration: 0.32, frequency: 1500 },
      { start: 2.05, duration: 0.22, frequency: 950 },
      { start: 2.37, duration: 0.42, frequency: 1320 }
    ];

    beepPattern.forEach((beep) => {
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = 'square';
      oscillator.frequency.setValueAtTime(beep.frequency, now + beep.start);

      gain.gain.setValueAtTime(0.0001, now + beep.start);
      gain.gain.linearRampToValueAtTime(0.7, now + beep.start + 0.02);
      gain.gain.linearRampToValueAtTime(0.7, now + beep.start + beep.duration - 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + beep.start + beep.duration);

      oscillator.connect(gain);
      gain.connect(masterGain);

      oscillator.start(now + beep.start);
      oscillator.stop(now + beep.start + beep.duration);
    });

    return true;
  } catch (e) {
    console.warn('TapCarta sound tone failed', e);
    return false;
  }
}

function playRestaurantManualConfirmationTone() {
  const audioContext = getRestaurantAudioContext();

  if (!audioContext || audioContext.state !== 'running') {
    return false;
  }

  try {
    const now = audioContext.currentTime;
    const masterGain = audioContext.createGain();

    masterGain.gain.setValueAtTime(0.001, now);
    masterGain.gain.linearRampToValueAtTime(0.95, now + 0.008);
    masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.46);
    masterGain.connect(audioContext.destination);

    const firstOscillator = audioContext.createOscillator();
    const firstGain = audioContext.createGain();

    firstOscillator.type = 'square';
    firstOscillator.frequency.setValueAtTime(1320, now);

    firstGain.gain.setValueAtTime(0.0001, now);
    firstGain.gain.linearRampToValueAtTime(1, now + 0.008);
    firstGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);

    firstOscillator.connect(firstGain);
    firstGain.connect(masterGain);

    firstOscillator.start(now);
    firstOscillator.stop(now + 0.14);

    const secondStart = now + 0.16;
    const secondOscillator = audioContext.createOscillator();
    const secondGain = audioContext.createGain();

    secondOscillator.type = 'square';
    secondOscillator.frequency.setValueAtTime(1760, secondStart);

    secondGain.gain.setValueAtTime(0.0001, secondStart);
    secondGain.gain.linearRampToValueAtTime(1, secondStart + 0.008);
    secondGain.gain.exponentialRampToValueAtTime(0.0001, secondStart + 0.18);

    secondOscillator.connect(secondGain);
    secondGain.connect(masterGain);

    secondOscillator.start(secondStart);
    secondOscillator.stop(secondStart + 0.19);

    return true;
  } catch (e) {
    console.warn('TapCarta manual confirmation sound failed', e);
    return false;
  }
}

function notifyIfNewActionRequests() {
  const popupRequests = getRestaurantPopupNotificationRequests();
  const popupKeys = popupRequests.map(getRestaurantRequestNotificationKey);
  const state = window.tapCartaRestaurantRequestNotificationState;

  if (!popupKeys.length || isRestaurantRequestModalOpen()) {
    document.getElementById('restaurant-new-request-notification')?.remove();
  }

  if (!state.knownActionRequestIds) {
    state.knownActionRequestIds = new Set(popupKeys);

    if (popupKeys.length) {
      state.lastNotificationAt = Date.now();
      notifyRestaurantNewRequestSound();

      if (!isRestaurantRequestModalOpen()) {
        showRestaurantNewRequestNotification(popupKeys.length);
      }
    }

    return;
  }

  const newKeys = popupKeys.filter((key) => !state.knownActionRequestIds.has(key));
  state.knownActionRequestIds = new Set(popupKeys);

  if (newKeys.length) {
    const now = Date.now();

    if (now - state.lastNotificationAt >= 5000) {
      state.lastNotificationAt = now;
      notifyRestaurantNewRequestSound();
    }

    if (!isRestaurantRequestModalOpen()) {
      showRestaurantNewRequestNotification(popupKeys.length);
    }

    return;
  }

  const existingNotification = document.getElementById('restaurant-new-request-notification');

  if (!popupKeys.length && existingNotification) {
    existingNotification.remove();
  }
}

function getBookingDateTimeMs(sourceRequest) {
  const bookingDate = sourceRequest?.booking?.date || '';
  const bookingTime = sourceRequest?.booking?.time || '00:00';

  if (!bookingDate) return NaN;

  const parsed = new Date(`${bookingDate}T${bookingTime}`);
  const timeMs = parsed.getTime();

  return Number.isFinite(timeMs) ? timeMs : NaN;
}

function getRequestReferenceDateTimeMs(sourceRequest) {
  const rawValue =
    sourceRequest?.confirmedAt ||
    sourceRequest?.updatedAt ||
    sourceRequest?.createdAt;

  const parsed = rawValue ? new Date(rawValue).getTime() : NaN;
  return Number.isFinite(parsed) ? parsed : Date.now();
}

function getOrderDateTimeMs(sourceRequest) {
  const orderDate = sourceRequest?.order?.date || '';
  const orderTime = sourceRequest?.order?.time || '00:00';

  if (!orderDate) return NaN;

  const parsed = new Date(`${orderDate}T${orderTime}`);
  const timeMs = parsed.getTime();

  return Number.isFinite(timeMs) ? timeMs : NaN;
}

function getNextFiveAMCleanupMs(referenceMs) {
  const cleanupDate = new Date(referenceMs);
  cleanupDate.setHours(5, 0, 0, 0);

  if (referenceMs >= cleanupDate.getTime()) {
    cleanupDate.setDate(cleanupDate.getDate() + 1);
  }

  return cleanupDate.getTime();
}

function isSameLocalDay(timestampA, timestampB) {
  const dateA = new Date(timestampA);
  const dateB = new Date(timestampB);

  return (
    dateA.getFullYear() === dateB.getFullYear() &&
    dateA.getMonth() === dateB.getMonth() &&
    dateA.getDate() === dateB.getDate()
  );
}

const pendingUnconfirmedHistoryClosures = new Set();

async function markRequestAsUnconfirmedHistory(source, isBooking) {
  if (!source) {
    return false;
  }

  const previousSource = {
    ...source,
    restaurantResponse: {
      ...(source.restaurantResponse || {})
    }
  };

  const nowIso = new Date().toISOString();

  source.status = isBooking
    ? 'presence_unknown_no_action'
    : 'service_unknown_no_action';

  source.autoClosedAt = nowIso;
  source.updatedAt = nowIso;
  source.treated = true;
  source.restaurantResponse = {
    ...(source.restaurantResponse || {}),
    reason: isBooking
      ? 'presence_or_absence_not_confirmed'
      : 'service_not_confirmed',
    message: isBooking
      ? (currentLang === 'es'
          ? 'Sin acción: presencia o ausencia no confirmada.'
          : currentLang === 'en'
            ? 'No action: presence or absence not confirmed.'
            : currentLang === 'nl'
              ? 'Geen actie: aanwezigheid of afwezigheid niet bevestigd.'
              : 'Aucune action : présence ou absence non confirmée.')
      : (currentLang === 'es'
          ? 'Sin acción: servicio no confirmado.'
          : currentLang === 'en'
            ? 'No action: service not confirmed.'
            : currentLang === 'nl'
              ? 'Geen actie: bediening niet bevestigd.'
              : 'Aucune action : service non confirmé.'),
    updatedBy: 'system'
  };

  const persisted = await persistRestaurantRequestUpdate(source);

  if (!persisted) {
    Object.assign(source, previousSource);
    return false;
  }

  return true;
}

function scheduleUnconfirmedHistoryClosure(source, isBooking) {
  const requestKey = String(source?.liveRequestId || source?.requestId || source?.id || '');

  if (!requestKey || pendingUnconfirmedHistoryClosures.has(requestKey)) {
    return;
  }

  pendingUnconfirmedHistoryClosures.add(requestKey);

  markRequestAsUnconfirmedHistory(source, isBooking)
    .then((persisted) => {
      if (persisted) {
        syncRequestsState();
        renderMenu();
      }
    })
    .finally(() => {
      pendingUnconfirmedHistoryClosures.delete(requestKey);
    });
}

function getRestaurantRequestBucket(item) {
  const source = item?.sourceRequest || {};
  const status = source.status || '';
  const isBooking = item?.type === t.restaurantTypeBooking;
  const now = Date.now();

  const bookingVerifyDelayMs = 60 * 60 * 1000;
  const orderVerifyDelayMs = 45 * 60 * 1000;

  if (source.historyDeleted === true) {
    return 'hidden';
  }

  if (
    status === 'served' ||
    status === 'arrived' ||
    status === 'not_arrived' ||
    status === 'not_served' ||
    status === 'cancelled' ||
    status === 'cancelled_by_client' ||
    status === 'presence_unknown_no_action' ||
    status === 'service_unknown_no_action'
  ) {
    return 'history';
  }

  if (!isBooking) {
    const orderTimeMs = getOrderDateTimeMs(source);
    const isOrderTimeKnown = Number.isFinite(orderTimeMs);

    if (status === 'accepted_by_client' || status === 'confirmed') {
      const referenceMs = isOrderTimeKnown ? orderTimeMs : getRequestReferenceDateTimeMs(source);
      const cleanupMs = getNextFiveAMCleanupMs(referenceMs);

      if (now >= cleanupMs) {
        scheduleUnconfirmedHistoryClosure(source, false);
        return 'verify';
      }

      if (isOrderTimeKnown) {
        if (now >= orderTimeMs + orderVerifyDelayMs) {
          return 'verify';
        }

        if (isSameLocalDay(orderTimeMs, now)) {
          return 'today';
        }

        if (orderTimeMs > now) {
          return 'upcoming';
        }
      }

      return now >= referenceMs + orderVerifyDelayMs ? 'verify' : 'today';
    }

    return item?.treated ? 'history' : 'action';
  }

  const bookingTimeMs = getBookingDateTimeMs(source);
  const isBookingTimeKnown = Number.isFinite(bookingTimeMs);

  if (status === 'pending' || status === 'modified' || status === 'rejected_by_client') {
    return 'action';
  }

  if (status === 'accepted_by_client' || status === 'confirmed') {
    if (!isBookingTimeKnown) {
      return 'upcoming';
    }

    const cleanupMs = getNextFiveAMCleanupMs(bookingTimeMs);

    if (now >= cleanupMs) {
      scheduleUnconfirmedHistoryClosure(source, true);
      return 'verify';
    }

    if (bookingTimeMs > now && !isSameLocalDay(bookingTimeMs, now)) {
      return 'upcoming';
    }

    if (now >= bookingTimeMs + bookingVerifyDelayMs) {
      return 'verify';
    }

    if (isSameLocalDay(bookingTimeMs, now)) {
      return 'today';
    }

    return 'upcoming';
  }

  return item?.treated ? 'history' : 'action';
}

function getRequestCreatedTimeMs(item) {
  const parsed = item?.createdAt ? new Date(item.createdAt).getTime() : NaN;
  return Number.isFinite(parsed) ? parsed : 0;
}

function getRequestUpdatedTimeMs(item) {
  const source = item?.sourceRequest || {};
  const rawValue =
    source.servedAt ||
    source.arrivedAt ||
    source.notServedAt ||
    source.notArrivedAt ||
    source.autoClosedAt ||
    source.updatedAt ||
    item?.updatedAt ||
    item?.createdAt;

  const parsed = rawValue ? new Date(rawValue).getTime() : NaN;
  return Number.isFinite(parsed) ? parsed : getRequestCreatedTimeMs(item);
}

function getRequestScheduledDateTimeMs(item) {
  const source = item?.sourceRequest || {};
  const isBooking = item?.type === t.restaurantTypeBooking;

  return isBooking
    ? getBookingDateTimeMs(source)
    : getOrderDateTimeMs(source);
}

function sortRequestsForBucket(items, bucket) {
  return [...items].sort((a, b) => {
    if (bucket === 'history') {
      return getRequestUpdatedTimeMs(b) - getRequestUpdatedTimeMs(a);
    }

    if (bucket === 'action') {
      return getRequestCreatedTimeMs(b) - getRequestCreatedTimeMs(a);
    }

    const timeA = getRequestScheduledDateTimeMs(a);
    const timeB = getRequestScheduledDateTimeMs(b);

    const hasTimeA = Number.isFinite(timeA);
    const hasTimeB = Number.isFinite(timeB);

    if (hasTimeA && hasTimeB && timeA !== timeB) {
      return timeA - timeB;
    }

    if (hasTimeA && !hasTimeB) return -1;
    if (!hasTimeA && hasTimeB) return 1;

    return getRequestCreatedTimeMs(a) - getRequestCreatedTimeMs(b);
  });
}

function getRequestSlotKey(item) {
  const source = item?.sourceRequest || {};
  const isBooking = item?.type === t.restaurantTypeBooking;
  const date = isBooking ? source.booking?.date : source.order?.date;
  const time = isBooking ? source.booking?.time : source.order?.time;

  if (!date || !time) return '';

  return `${isBooking ? 'booking' : 'order'}|${date}|${time}`;
}

function getRequestSlotQuantity(item) {
  const source = item?.sourceRequest || {};
  const isBooking = item?.type === t.restaurantTypeBooking;

  if (isBooking) {
    const people = Number(source.booking?.people || 0);
    return Number.isFinite(people) && people > 0 ? people : 0;
  }

  const items = Array.isArray(source.order?.items) ? source.order.items : [];
  return items.reduce((total, entry) => {
    const quantity = Number(entry?.quantity || 0);
    return total + (Number.isFinite(quantity) && quantity > 0 ? quantity : 0);
  }, 0);
}

function isRequestIncludedInSlotLoad(item) {
  const bucket = getRestaurantRequestBucket(item);
  return bucket === 'today' || bucket === 'upcoming' || bucket === 'verify';
}

function getRequestSlotLoadSummaries(items) {
  const slotMap = new Map();

  items.forEach((item) => {
    const slotKey = getRequestSlotKey(item);
    if (!slotKey) return;

    const source = item?.sourceRequest || {};
    const isBooking = item?.type === t.restaurantTypeBooking;
    const date = isBooking ? source.booking?.date : source.order?.date;
    const time = isBooking ? source.booking?.time : source.order?.time;

    if (!date || !time) return;

    if (!slotMap.has(slotKey)) {
      slotMap.set(slotKey, {
        key: slotKey,
        isBooking,
        date,
        time,
        count: 0,
        totalQuantity: 0
      });
    }

    const entry = slotMap.get(slotKey);
    entry.count += 1;
    entry.totalQuantity += getRequestSlotQuantity(item);
  });

  return [...slotMap.values()]
    .filter((entry) => entry.count > 1 && entry.totalQuantity > 0)
    .sort((a, b) => {
      const parsedA = new Date(`${a.date}T${a.time}`).getTime();
      const parsedB = new Date(`${b.date}T${b.time}`).getTime();

      if (Number.isFinite(parsedA) && Number.isFinite(parsedB) && parsedA !== parsedB) {
        return parsedA - parsedB;
      }

      return String(a.time).localeCompare(String(b.time));
    });
}

function renderRequestSlotLoadSummary(items) {
  const summaries = getRequestSlotLoadSummaries(items);

  if (!summaries.length) {
    return '';
  }

  return `

            : currentLang === 'en'

            : (currentLang === 'es'

                  : currentLang === 'nl'

function syncRequestsState() {
  requestsData = loadRestaurantRequests();

  activeRequests = sortRequestsForBucket(
    requestsData.filter(item => getRestaurantRequestBucket(item) === 'action'),
    'action'
  );

  todayRequests = sortRequestsForBucket(
    requestsData.filter(item => getRestaurantRequestBucket(item) === 'today'),
    'today'
  );

  upcomingRequests = sortRequestsForBucket(
    requestsData.filter(item => getRestaurantRequestBucket(item) === 'upcoming'),
    'upcoming'
  );

  verifyRequests = sortRequestsForBucket(
    requestsData.filter(item => getRestaurantRequestBucket(item) === 'verify'),
    'verify'
  );

  treatedRequests = sortRequestsForBucket(
    requestsData.filter(item => getRestaurantRequestBucket(item) === 'history'),
    'history'
  );

  selectedRequestIds = new Set(
    [...selectedRequestIds].filter((id) =>
      activeRequests.some((item) => String(item.id) === String(id))
    )
  );
  window.selectedRequestIds = selectedRequestIds;

  selectedHistoryRequestIds = new Set(
    [...selectedHistoryRequestIds].filter((id) =>
      treatedRequests.some((item) => String(item.id) === String(id))
    )
  );
  window.selectedHistoryRequestIds = selectedHistoryRequestIds;

  activeOrders = activeRequests.filter(item => item.type === t.restaurantTypeOrder);
  activeReservations = activeRequests.filter(item => item.type === t.restaurantTypeBooking);
}

window.validateSelectedRequests = async function() {
  const selectedItems = activeRequests.filter((item) => window.selectedRequestIds.has(String(item.id)));

  if (!selectedItems.length) {
    showRestaurantToast(t.restaurantActiveNothingSelected, 'info');
    return;
  }

  const confirmedBatch = await showRestaurantConfirmDialog({
    title: currentLang === 'es' ? 'Confirmar selección' : currentLang === 'en' ? 'Confirm selection' : currentLang === 'nl' ? 'Selectie bevestigen' : 'Confirmer la sélection',
    message: t.restaurantActiveConfirmValidateSelected.replace('{count}', selectedItems.length),
    confirmLabel: currentLang === 'es' ? 'Confirmar' : currentLang === 'en' ? 'Confirm' : currentLang === 'nl' ? 'Bevestigen' : 'Confirmer',
    cancelLabel: currentLang === 'es' ? 'Cancelar' : currentLang === 'en' ? 'Cancel' : currentLang === 'nl' ? 'Annuleren' : 'Annuler',
    danger: false
  });

  if (!confirmedBatch) {
    return;
  }

  const nowIso = new Date().toISOString();

  const results = await Promise.all(selectedItems.map(async (item) => {
    if (!item.sourceRequest) {
      return false;
    }

    const previousItemState = {
      treated: item.treated,
      status: item.status,
      sourceRequest: {
        ...item.sourceRequest,
        restaurantResponse: {
          ...(item.sourceRequest.restaurantResponse || {})
        }
      }
    };

    const isOrder = !!item.sourceRequest?.order;
    const confirmationMessage = isOrder
      ? t.restaurantOrderConfirmedMessage
      : t.restaurantBookingConfirmedMessage;

    item.treated = true;
    item.status = t.restaurantStatusProcessed;

    item.sourceRequest.status = 'confirmed';
    item.sourceRequest.updatedAt = nowIso;
    item.sourceRequest.confirmedAt = nowIso;
    item.sourceRequest.restaurantResponse = {
      ...(item.sourceRequest.restaurantResponse || {}),
      reason: 'confirmed',
      message: confirmationMessage,
      updatedBy: 'restaurant'
    };

    const persisted = await persistRestaurantRequestUpdate(item.sourceRequest);

    if (!persisted) {
      item.treated = previousItemState.treated;
      item.status = previousItemState.status;
      item.sourceRequest = previousItemState.sourceRequest;
      return false;
    }

    return true;
  }));

  const hasFailure = results.some((result) => result !== true);

  if (hasFailure) {
    showRestaurantToast(
      currentLang === 'es'
        ? 'Una o varias acciones no se han guardado. Comprueba la conexión.'
        : currentLang === 'en'
          ? 'One or more actions were not saved. Check the connection.'
          : currentLang === 'nl'
            ? 'Een of meerdere acties zijn niet opgeslagen. Controleer de verbinding.'
            : 'Une ou plusieurs actions n’ont pas été enregistrées. Vérifiez la connexion.',
      'danger'
    );
  }

  window.selectedRequestIds = new Set();
  syncRequestsState();
  dismissRestaurantNewRequestNotification();
  renderMenu();
};

      ...(item.sourceRequest.restaurantResponse || {}),

  const hasFailure = results.some((result) => result !== true);

  if (hasFailure) {
    showRestaurantToast(
      currentLang === 'es'
        ? 'Uno o varios elementos no se han retirado del historial. Comprueba la conexión.'

            : 'Un ou plusieurs éléments n’ont pas été retirés de l’historique. Vérifiez la connexion.',
      'danger'
    );
  } else {
    showRestaurantToast(
      currentLang === 'es'
        ? 'Retirado del historial visible.'
        : currentLang === 'en'
          ? 'Removed from visible history.'
          : currentLang === 'nl'
            ? 'Verwijderd uit zichtbare geschiedenis.'
            : 'Retiré de l’historique visible.',
      'info'
    );
  }

  window.selectedHistoryRequestIds = new Set();
  syncRequestsState();
  renderMenu();
};

function getElapsedLabel(item) {
  const diffMs = Math.max(0, Date.now() - item.createdAt);
  const diffSeconds = Math.floor(diffMs / 1000);

  if (diffSeconds < 30) return t.restaurantReceivedNow;
  if (diffSeconds < 60) return t.restaurantReceived30Sec;

  const roundedSeconds = Math.floor(diffSeconds / 30) * 30;

  const hours = Math.floor(roundedSeconds / 3600);
  const remainingSecondsAfterHours = roundedSeconds % 3600;
  const minutes = Math.floor(remainingSecondsAfterHours / 60);
  const seconds = remainingSecondsAfterHours % 60;

  let timeLabel = '';

  if (hours > 0) {
    if (minutes === 0 && seconds === 0) {
      timeLabel = `${hours} h`;
    } else if (seconds === 0) {
      timeLabel = `${hours} h ${minutes} min`;
    } else {
      timeLabel = `${hours} h ${minutes} min 30`;
    }
  } else {
    timeLabel = seconds === 0 ? `${minutes} min` : `${minutes} min 30`;
  }

  return t.restaurantReceivedMinutes.replace('{time}', timeLabel);
}

    return 'bg-emerald-500/15 text-emerald-200 border-emerald-400/30';

async function persistRestaurantRequestUpdate(updatedRequest) {
  const isOrderRequest = !!updatedRequest?.order || updatedRequest?.requestType === 'order';
  const requestType = isOrderRequest ? 'order' : 'booking';
  const liveRequestId = updatedRequest?.liveRequestId || updatedRequest?.requestId || '';

  const activeRestaurantId =
    updatedRequest?.restaurantId ||
    activeRestaurantData?.identity?.id ||
    activeRestaurantData?.id ||
    siteConfig?.identity?.id ||
    '';

  const nowIso = new Date().toISOString();
  const updatedAt = updatedRequest?.updatedAt || nowIso;

  updatedRequest.updatedAt = updatedAt;

  const restaurantResponse =
    updatedRequest?.restaurantResponse && typeof updatedRequest.restaurantResponse === 'object'
      ? {
          ...updatedRequest.restaurantResponse,
          message: updatedRequest.restaurantResponse.message || '',
          updatedBy: updatedRequest.restaurantResponse.updatedBy || 'restaurant'
        }
      : null;

  function updateLiveMemoryCache() {
    const cache = window.tapCartaRestaurantLiveRequestsCache || {
      bookings: [],
      orders: [],
      updatedAt: null,
      error: null
    };

    const cacheKey = isOrderRequest ? 'orders' : 'bookings';
    const currentList = Array.isArray(cache[cacheKey]) ? cache[cacheKey] : [];

    const updatedList = currentList.map((entry) => {
      const sameRequest =
        String(entry?.requestId || '') === String(updatedRequest?.requestId || '') ||
        String(entry?.liveRequestId || '') === String(liveRequestId || '');

      if (!sameRequest) {
        return entry;
      }

      return {
        ...entry,
        ...updatedRequest,
        status: updatedRequest.status || entry.status,
        updatedAt,
        confirmedAt: updatedRequest.confirmedAt || entry.confirmedAt || null,
        cancelledAt: updatedRequest.cancelledAt || entry.cancelledAt || null,
        servedAt: updatedRequest.servedAt || entry.servedAt || null,
        arrivedAt: updatedRequest.arrivedAt || entry.arrivedAt || null,
        notServedAt: updatedRequest.notServedAt || entry.notServedAt || null,
        notArrivedAt: updatedRequest.notArrivedAt || entry.notArrivedAt || null,
        autoClosedAt: updatedRequest.autoClosedAt || entry.autoClosedAt || null,
        historyDeleted: updatedRequest.historyDeleted === true ? true : entry.historyDeleted === true,
        historyUpdatedAt: updatedRequest.historyUpdatedAt || entry.historyUpdatedAt || updatedAt,
        restaurantResponse: {
          ...(entry.restaurantResponse || {}),
          ...(restaurantResponse || {})
        }
      };
    });

    window.tapCartaRestaurantLiveRequestsCache = {
      ...cache,
      [cacheKey]: updatedList,
      updatedAt,
      error: null
    };
  }

  async function runSupabaseUpdate(payload) {
    let query = supabaseClient
      .from('requests')
      .update(payload)
      .eq('id', liveRequestId)
      .eq('type', requestType);

    if (activeRestaurantId) {
      query = query.eq('restaurant_id', activeRestaurantId);
    }

    return await query;
  }

  try {
    if (!liveRequestId || !activeRestaurantId || typeof supabaseClient === 'undefined' || !supabaseClient) {
      console.warn(
        isOrderRequest
          ? 'TapCarta Restaurant: commande non synchronisée, identifiant live ou restaurant manquant'
          : 'TapCarta Restaurant: réservation non synchronisée, identifiant live ou restaurant manquant',
        {
          liveRequestId,
          activeRestaurantId,
          requestType
        }
      );

      return false;
    }

    const livePayload = {
      status: updatedRequest.status || 'pending',
      updated_at: updatedAt,
      restaurant_message: restaurantResponse?.message || null
    };

    if (restaurantResponse) {
      livePayload.restaurant_response = restaurantResponse;
    }

    let { error } = await runSupabaseUpdate(livePayload);

    if (error && livePayload.restaurant_response) {
      const fallbackPayload = {
        status: livePayload.status,
        updated_at: livePayload.updated_at,
        restaurant_message: updatedRequest.historyDeleted === true
          ? `${livePayload.restaurant_message || ''} ${TAPCARTA_HISTORY_DELETED_MARKER}`.trim()
          : livePayload.restaurant_message
      };

      const fallbackResult = await runSupabaseUpdate(fallbackPayload);
      error = fallbackResult.error;

      if (!error) {
        console.warn(
          'TapCarta Restaurant: champ restaurant_response non accepté par Supabase, fallback restaurant_message utilisé.'
        );
      }
    }

    if (error) {
      console.warn(
        isOrderRequest
          ? 'TapCarta Restaurant: impossible de synchroniser la commande live'
          : 'TapCarta Restaurant: impossible de synchroniser la réservation live',
        error
      );

      return false;
    }

    updateLiveMemoryCache();
    return true;
  } catch (error) {
    console.warn('TapCarta Restaurant: impossible de persister la mise à jour Supabase', error);
    return false;
  }
}

function getManualRequestTodayValue() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');

  return `${year}-${month}-${day}`;
}

function getManualRequestNextSimpleTimeValue() {
  const now = new Date();
  now.setMinutes(now.getMinutes() + 30);

  const minutes = now.getMinutes();
  const roundedMinutes = minutes <= 30 ? 30 : 0;

  if (minutes > 30) {
    now.setHours(now.getHours() + 1);
  }

  now.setMinutes(roundedMinutes, 0, 0);

  const hours = String(now.getHours()).padStart(2, '0');
  const mins = String(now.getMinutes()).padStart(2, '0');

  return `${hours}:${mins}`;
}

function saveManualBookingToLocalStorage(manualBooking) {
  if (!manualBooking?.liveRequestId) {
    return false;
  }

  const cache = window.tapCartaRestaurantLiveRequestsCache || {
    bookings: [],
    orders: [],
    updatedAt: null,
    error: null
  };

  const currentBookings = Array.isArray(cache.bookings) ? cache.bookings : [];

  const withoutDuplicate = currentBookings.filter(
    (entry) =>
      String(entry?.requestId || '') !== String(manualBooking.requestId || '') &&
      String(entry?.liveRequestId || '') !== String(manualBooking.liveRequestId || '')
  );

  window.tapCartaRestaurantLiveRequestsCache = {
    ...cache,
    bookings: [manualBooking, ...withoutDuplicate],
    updatedAt: new Date().toISOString(),
    error: null
  };

  return true;
}

async function createManualBookingInSupabase(manualBooking) {
  if (!window.supabaseClient || !manualBooking?.restaurantId) {
    return manualBooking;
  }

  const payload = {
    restaurant_id: manualBooking.restaurantId,
    type: 'booking',
    status: 'confirmed',
    client_name: manualBooking.customer?.name || '',
    client_phone: manualBooking.customer?.phone || '',
    client_language: manualBooking.customer?.language || currentLang,
    booking_date: manualBooking.booking?.date || null,
    booking_time: manualBooking.booking?.time || null,
    party_size: Number(manualBooking.booking?.people || 1),
    note: manualBooking.booking?.note || '',
    items: [],
    restaurant_message: manualBooking.restaurantResponse?.message || '',
    created_at: manualBooking.createdAt,
    updated_at: manualBooking.updatedAt
  };

  try {
    const { data, error } = await supabaseClient
      .from('requests')
      .insert(payload)
      .select('*')
      .single();

    if (error) throw error;

    if (!data?.id) {
      return manualBooking;
    }

    return {
      ...manualBooking,
      requestId: data.id,
      liveRequestId: data.id,
      createdAt: data.created_at || manualBooking.createdAt,
      updatedAt: data.updated_at || manualBooking.updatedAt
    };
  } catch (error) {
    console.warn('TapCarta Restaurant: impossible de créer la réservation manuelle dans Supabase', error);
    return manualBooking;
  }
}

      showManualBookingFormError(currentTexts.peopleRequired, 'input[name="bookingPeople"]');
      return;
    }

    const submitButton = form.querySelector('button[type="submit"]');
    if (submitButton) {
      submitButton.disabled = true;
      submitButton.classList.add('opacity-60', 'pointer-events-none');
    }

    const localManualBooking = buildManualBookingRequestFromForm(form);
    const syncedManualBooking = await createManualBookingInSupabase(localManualBooking);

    if (!syncedManualBooking.liveRequestId) {
      console.warn(
        'TapCarta Restaurant: réservation manuelle non enregistrée, synchronisation Supabase non confirmée.',
        syncedManualBooking
      );

      if (submitButton) {
        submitButton.disabled = false;
        submitButton.classList.remove('opacity-60', 'pointer-events-none');
      }

      showManualBookingFormError(
        'Impossible d’enregistrer la réservation pour le moment. Réessayez dans quelques instants.',
        'input[name="customerName"]'
      );

      return;
    }

    saveManualBookingToLocalStorage(syncedManualBooking);

    overlay.remove();

    syncRequestsState();
    renderMenu();

    void playRestaurantManualConfirmationSound();

    showRestaurantToast(currentTexts.saved, 'info');
  });

  if (window.lucide) {
    requestAnimationFrame(() => lucide.createIcons());
  }

  window.setTimeout(() => {
    overlay.querySelector('input[name="customerName"]')?.focus();
  }, 80);
}

function getManualOrderAvailableMenuItems() {
  const categories = Array.isArray(activeRestaurantData?.menu?.categories)
    ? activeRestaurantData.menu.categories
    : [];

  return categories.flatMap((category) => {
    const categoryName = category?.name || '';
    const items = Array.isArray(category?.items) ? category.items : [];

    return items
      .filter((item) => item && item.visible !== false && item.available !== false)
      .map((item) => ({
        id: item.id || `manual_item_${Date.now()}_${Math.random().toString(16).slice(2)}`,
        name: item.name || '',
        category: categoryName,
        price: Number(item.price || 0)
      }));
  });
}

function saveManualOrderToLocalStorage(manualOrder) {
  if (!manualOrder?.liveRequestId) {
    return false;
  }

  const cache = window.tapCartaRestaurantLiveRequestsCache || {
    bookings: [],
    orders: [],
    updatedAt: null,
    error: null
  };

  const currentOrders = Array.isArray(cache.orders) ? cache.orders : [];

  const withoutDuplicate = currentOrders.filter(
    (entry) =>
      String(entry?.requestId || '') !== String(manualOrder.requestId || '') &&
      String(entry?.liveRequestId || '') !== String(manualOrder.liveRequestId || '')
  );

  window.tapCartaRestaurantLiveRequestsCache = {
    ...cache,
    orders: [manualOrder, ...withoutDuplicate],
    updatedAt: new Date().toISOString(),
    error: null
  };

  return true;
}

async function createManualOrderInSupabase(manualOrder) {
  if (!window.supabaseClient || !manualOrder?.restaurantId) {
    return manualOrder;
  }

  const payload = {
    restaurant_id: manualOrder.restaurantId,
    type: 'order',
    status: 'confirmed',
    client_name: manualOrder.customer?.name || '',
    client_phone: manualOrder.customer?.phone || '',
    client_language: manualOrder.customer?.language || currentLang,
    booking_date: manualOrder.order?.date || null,
    booking_time: manualOrder.order?.time || null,
    note: manualOrder.order?.note || '',
    items: Array.isArray(manualOrder.order?.items) ? manualOrder.order.items : [],
    restaurant_message: manualOrder.restaurantResponse?.message || '',
    created_at: manualOrder.createdAt,
    updated_at: manualOrder.updatedAt
  };

  try {
    const { data, error } = await supabaseClient
      .from('requests')
      .insert(payload)
      .select('*')
      .single();

    if (error) throw error;

    if (!data?.id) {
      return manualOrder;
    }

    return {
      ...manualOrder,
      requestId: data.id,
      liveRequestId: data.id,
      createdAt: data.created_at || manualOrder.createdAt,
      updatedAt: data.updated_at || manualOrder.updatedAt
    };
  } catch (error) {
    console.warn('TapCarta Restaurant: impossible de créer la commande manuelle dans Supabase', error);
    return manualOrder;
  }
}

function buildManualOrderRequestFromForm(form, cartItems) {
  const formData = new FormData(form);
  const nowIso = new Date().toISOString();
  const activeRestaurantId = getActiveRestaurantIdForManualRequest();
  const manualOrigin = String(formData.get('manualOrigin') || 'phone');
  const customerName = String(formData.get('customerName') || '').trim();
  const customerPhone = String(formData.get('customerPhone') || '').trim();
  const orderDate = String(formData.get('orderDate') || '').trim();
  const orderTime = String(formData.get('orderTime') || '').trim();
  const orderNote = String(formData.get('orderNote') || '').trim();
  const safeCartItems = Array.isArray(cartItems) ? cartItems : [];
  const totalAmount = safeCartItems.reduce(
    (total, item) => total + Number(item.price || 0) * Number(item.quantity || 1),
    0
  );
  const localRequestId =
    window.crypto?.randomUUID
      ? `manual_order_${window.crypto.randomUUID()}`
      : `manual_order_${Date.now()}`;

  return {
    restaurantId: activeRestaurantId,
    requestId: localRequestId,
    requestType: 'order',
    createdAt: nowIso,
    updatedAt: nowIso,
    status: 'confirmed',
    confirmedAt: nowIso,
    createdBy: 'restaurant',
    sourceChannel: 'manual',
    manualOrigin,
    clientVisible: false,
    clientAccessToken: null,
    customer: {
      name: customerName,
      phone: customerPhone,
      language: currentLang
    },
    order: {
      date: orderDate,
      time: orderTime,
      note: orderNote,
      items: safeCartItems.map((item) => ({
        id: item.id || '',
        name: item.name || '',
        category: item.category || '',
        quantity: Number(item.quantity || 1),
        price: Number(item.price || 0)
      })),
      totalAmount,
      manualOriginLabel: getManualOriginLabel(manualOrigin)
    },
    restaurantResponse: {
      reason: 'confirmed',
      message:
        currentLang === 'es'
          ? 'Pedido añadido manualmente por el restaurante.'
          : currentLang === 'en'
            ? 'Order manually added by the restaurant.'
            : currentLang === 'nl'
              ? 'Bestelling handmatig toegevoegd door het restaurant.'
              : 'Commande ajoutée manuellement par le restaurant.',
      updatedBy: 'restaurant'
    }
  };
}

              class="hidden btn-action px-5 py-3 rounded-2xl border border-gold/35 bg-gold/10 text-sm font-extrabold text-gold hover:bg-gold/15 transition-all"
            >
              ${editInfoLabel}
            </button>

            <button
              type="button"
              data-manual-order-continue
              class="btn-action px-6 py-3 rounded-2xl border-2 border-gold bg-gold text-black text-sm font-extrabold hover:bg-gold/90 transition-all"
            >
              ${continueLabel}
            </button>

            <button
              type="submit"
              data-manual-order-submit
              class="hidden btn-action px-6 py-3 rounded-2xl border-2 border-gold bg-gold text-black text-sm font-extrabold hover:bg-gold/90 transition-all"
            >
              ${confirmOrderLabel}
            </button>
          </div>
        </div>
      </form>
    </div>
  `;

  document.body.appendChild(overlay);

  const form = overlay.querySelector('#restaurant-manual-order-form');
  const manualOrderErrorBox = overlay.querySelector('[data-manual-order-error]');
  const manualOriginInput = overlay.querySelector('input[name="manualOrigin"]');
  const manualOriginButtons = overlay.querySelectorAll('[data-manual-order-origin]');
  const categoryButtons = overlay.querySelectorAll('[data-manual-order-category]');
  const menuList = overlay.querySelector('[data-manual-order-menu-list]');
  const cartList = overlay.querySelector('[data-manual-order-cart-list]');
  const totalBox = overlay.querySelector('[data-manual-order-total]');
  const countBox = overlay.querySelector('[data-manual-order-count]');
  const mobileTotalBox = overlay.querySelector('[data-manual-order-mobile-total]');
  const mobileCountBox = overlay.querySelector('[data-manual-order-mobile-count]');
  const footerTotalBox = overlay.querySelector('[data-manual-order-footer-total]');
  const footerCountBox = overlay.querySelector('[data-manual-order-footer-count]');
  const infoPanel = overlay.querySelector('[data-manual-order-info-panel]');
  const cashierPanel = overlay.querySelector('[data-manual-order-cashier-panel]');
  const continueButton = overlay.querySelector('[data-manual-order-continue]');
  const submitButton = overlay.querySelector('[data-manual-order-submit]');
  const editInfoButton = overlay.querySelector('[data-manual-order-edit-info]');
  const footerEditInfoButton = overlay.querySelector('[data-manual-order-footer-edit-info]');
  const infoStepPill = overlay.querySelector('[data-manual-order-step-pill="info"]');
  const cashierStepPill = overlay.querySelector('[data-manual-order-step-pill="cashier"]');
  const infoSummary = overlay.querySelector('[data-manual-order-info-summary]');

  const showManualOrderFormError = (message, selector) => {
    if (manualOrderErrorBox) {
      manualOrderErrorBox.textContent = message;
      manualOrderErrorBox.classList.remove('hidden');
      manualOrderErrorBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    const targetField = selector ? overlay.querySelector(selector) : null;

    if (targetField) {
      targetField.focus();
    }
  };

  const clearManualOrderFormError = () => {
    if (manualOrderErrorBox) {
      manualOrderErrorBox.textContent = '';
      manualOrderErrorBox.classList.add('hidden');
    }
  };

  const getManualOrderFormSnapshot = () => {
    const formData = new FormData(form);

    return {
      customerName: String(formData.get('customerName') || '').trim(),
      customerPhone: String(formData.get('customerPhone') || '').trim(),
      orderDate: String(formData.get('orderDate') || '').trim(),
      orderTime: String(formData.get('orderTime') || '').trim(),
      manualOrigin: String(formData.get('manualOrigin') || 'phone'),
      orderNote: String(formData.get('orderNote') || '').trim()
    };
  };

  const validateManualOrderInfoStep = () => {
    const currentTexts = getManualOrderTexts();
    const snapshot = getManualOrderFormSnapshot();

    clearManualOrderFormError();

    if (!snapshot.customerName) {
      showManualOrderFormError(currentTexts.required, 'input[name="customerName"]');
      return false;
    }

    if (!snapshot.orderDate) {
      showManualOrderFormError(currentTexts.dateRequired, 'input[name="orderDate"]');
      return false;
    }

    if (!snapshot.orderTime) {
      showManualOrderFormError(currentTexts.timeRequired, 'input[name="orderTime"]');
      return false;
    }

    return true;
  };

  const updateManualOrderInfoSummary = () => {
    if (!infoSummary) return;

    const snapshot = getManualOrderFormSnapshot();
    const phonePart = snapshot.customerPhone ? ` · ${snapshot.customerPhone}` : '';
    const notePart = snapshot.orderNote ? ` · ${snapshot.orderNote}` : '';

    infoSummary.textContent = `${snapshot.customerName}${phonePart} · ${snapshot.orderDate} ${snapshot.orderTime}${notePart}`;
  };

  const setManualOrderStep = (nextStep) => {
    manualOrderStep = nextStep;

    const isInfoStep = manualOrderStep === 'info';

    infoPanel?.classList.toggle('hidden', !isInfoStep);
    cashierPanel?.classList.toggle('hidden', isInfoStep);
    continueButton?.classList.toggle('hidden', !isInfoStep);
    submitButton?.classList.toggle('hidden', isInfoStep);
    footerEditInfoButton?.classList.toggle('hidden', isInfoStep);

    infoStepPill?.classList.toggle('border-gold', isInfoStep);
    infoStepPill?.classList.toggle('bg-gold', isInfoStep);
    infoStepPill?.classList.toggle('text-black', isInfoStep);
    infoStepPill?.classList.toggle('border-white/10', !isInfoStep);
    infoStepPill?.classList.toggle('bg-black/30', !isInfoStep);
    infoStepPill?.classList.toggle('text-cream', !isInfoStep);

    cashierStepPill?.classList.toggle('border-gold', !isInfoStep);
    cashierStepPill?.classList.toggle('bg-gold', !isInfoStep);
    cashierStepPill?.classList.toggle('text-black', !isInfoStep);
    cashierStepPill?.classList.toggle('border-white/10', isInfoStep);
    cashierStepPill?.classList.toggle('bg-black/30', isInfoStep);
    cashierStepPill?.classList.toggle('text-cream', isInfoStep);

    if (!isInfoStep) {
      updateManualOrderInfoSummary();
      renderManualOrderCart();
    }
  };

  const getFilteredMenuItems = () => {
    if (activeCategory === 'all') {
      return menuItems;
    }

    return menuItems.filter((item) => String(item.category || '') === String(activeCategory));
  };

  const updateManualOrderSummaries = () => {
    const totalAmount = cartItems.reduce(
      (total, item) => total + Number(item.price || 0) * Number(item.quantity || 1),
      0
    );

    const itemCount = cartItems.reduce(
      (total, item) => total + Number(item.quantity || 0),
      0
    );

    const countText = `${itemCount} ${itemCountLabel}`;
    const totalText = formatRequestAmount(totalAmount);

    [totalBox, mobileTotalBox, footerTotalBox].forEach((box) => {
      if (box) box.textContent = totalText;
    });

    [countBox, mobileCountBox, footerCountBox].forEach((box) => {
      if (box) box.textContent = countText;
    });
  };

  const renderManualOrderMenu = () => {
    if (!menuList) return;

    const filteredItems = getFilteredMenuItems();

    if (!filteredItems.length) {
      menuList.innerHTML = `
        <div class="sm:col-span-2 lg:col-span-3 rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-4 text-sm font-semibold text-cream/70">
          ${texts.noMenu}
        </div>
      `;
      return;
    }

    menuList.innerHTML = filteredItems.map((item) => {
      const quantity = getCartQuantityForItem(item.id);
      const isSelected = quantity > 0;

      return `
        <button
          type="button"
          data-manual-order-add-item="${escapeRequestDetailsHtml(item.id)}"
          class="manual-order-menu-item w-full min-h-[86px] text-left rounded-2xl border px-3 py-3 transition-all ${
            isSelected
              ? 'border-gold bg-gold/15 shadow-[0_0_0_1px_rgba(242,199,68,0.25)]'
              : 'border-white/10 bg-white/[0.03] hover:border-gold/45 hover:bg-gold/8'
          }"
        >
          <div class="flex h-full flex-col justify-between gap-2">
            <div class="flex items-start justify-between gap-2">
              <div class="min-w-0">
                <div class="text-sm font-extrabold text-cream leading-tight">${escapeRequestDetailsHtml(item.name)}</div>
                <div class="text-[11px] text-cream/50 truncate mt-0.5">${escapeRequestDetailsHtml(item.category)}</div>
              </div>

              <span
                data-manual-order-item-qty="${escapeRequestDetailsHtml(item.id)}"
                class="${isSelected ? 'inline-flex' : 'hidden'} shrink-0 items-center justify-center min-w-9 h-8 rounded-xl bg-gold text-black text-sm font-extrabold"
              >
                ×${quantity}
              </span>
            </div>

            <div class="flex items-center justify-between gap-2">
              <span class="text-sm font-extrabold text-gold">${formatRequestAmount(item.price)}</span>
              <span class="inline-flex items-center justify-center h-8 rounded-xl bg-gold text-black px-3 text-xs font-extrabold">
                + ${texts.add}
              </span>
            </div>
          </div>
        </button>
      `;
    }).join('');

    if (window.lucide) {
      requestAnimationFrame(() => lucide.createIcons());
    }
  };

  const renderManualOrderCart = (focusItemId = null) => {
    updateManualOrderSummaries();
    renderManualOrderMenu();

    if (!cartList) return;

    if (!cartItems.length) {
      cartList.innerHTML = `
        <div class="rounded-2xl border border-white/10 bg-black/20 px-4 py-5 text-sm font-semibold text-cream/65">
          ${texts.emptyCart}
        </div>
      `;
      return;
    }

    cartList.innerHTML = cartItems.map((item) => `
      <div
        data-manual-order-cart-item="${escapeRequestDetailsHtml(item.id)}"
        class="rounded-2xl border border-white/10 bg-black/25 px-3 py-3 transition-all duration-200"
      >
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="text-sm font-bold text-cream leading-tight">${escapeRequestDetailsHtml(item.name)}</div>
            <div class="text-[11px] text-cream/50">${escapeRequestDetailsHtml(item.category)}</div>
            <div class="text-xs font-extrabold text-gold mt-1">${formatRequestAmount(Number(item.price || 0) * Number(item.quantity || 1))}</div>
          </div>

          <div class="flex items-center gap-1.5 shrink-0">
            <button type="button" data-manual-order-decrease="${escapeRequestDetailsHtml(item.id)}" class="btn-action w-9 h-9 rounded-xl border border-white/10 text-cream hover:bg-white/5">
              -
            </button>

            <span class="inline-flex items-center justify-center min-w-10 h-9 rounded-xl border border-gold/30 bg-gold/10 text-gold text-sm font-extrabold">
              ×${item.quantity || 1}
            </span>

            <button type="button" data-manual-order-increase="${escapeRequestDetailsHtml(item.id)}" class="btn-action w-9 h-9 rounded-xl border border-white/10 text-cream hover:bg-white/5">
              +
            </button>

            <button type="button" data-manual-order-remove="${escapeRequestDetailsHtml(item.id)}" class="btn-action w-9 h-9 rounded-xl border border-red-400/25 text-red-200 hover:bg-red-500/10">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      </div>
    `).join('');

    if (focusItemId) {
      requestAnimationFrame(() => {
        const focusedCartItem = cartList.querySelector(
          `[data-manual-order-cart-item="${CSS.escape(String(focusItemId))}"]`
        );

        if (focusedCartItem) {
          focusedCartItem.scrollIntoView({
            behavior: 'smooth',
            block: 'nearest'
          });

          focusedCartItem.classList.add('manual-order-cart-focus');

          window.setTimeout(() => {
            focusedCartItem.classList.remove('manual-order-cart-focus');
          }, 650);
        }
      });
    }

    if (window.lucide) {
      requestAnimationFrame(() => lucide.createIcons());
    }
  };

  overlay.querySelectorAll('[data-close-manual-order]').forEach((button) => {
    button.addEventListener('click', () => overlay.remove());
  });

  overlay.addEventListener('click', (event) => {
    if (event.target === overlay) {
      overlay.remove();
    }
  });

  continueButton?.addEventListener('click', () => {
    if (!validateManualOrderInfoStep()) {
      return;
    }

    setManualOrderStep('cashier');
  });

  const returnToManualOrderInfoStep = () => {
    clearManualOrderFormError();
    setManualOrderStep('info');
  };

  editInfoButton?.addEventListener('click', returnToManualOrderInfoStep);
  footerEditInfoButton?.addEventListener('click', returnToManualOrderInfoStep);

  manualOriginButtons.forEach((button) => {
    button.addEventListener('click', () => {
      clearManualOrderFormError();

      const selectedOrigin = button.getAttribute('data-manual-order-origin') || 'phone';

      if (manualOriginInput) {
        manualOriginInput.value = selectedOrigin;
      }

      manualOriginButtons.forEach((originButton) => {
        const isSelected = originButton === button;

        originButton.classList.toggle('border-gold', isSelected);
        originButton.classList.toggle('bg-gold', isSelected);
        originButton.classList.toggle('text-black', isSelected);
        originButton.classList.toggle('font-extrabold', isSelected);

        originButton.classList.toggle('border-white/10', !isSelected);
        originButton.classList.toggle('bg-black/30', !isSelected);
        originButton.classList.toggle('text-cream', !isSelected);
        originButton.classList.toggle('font-semibold', !isSelected);
      });
    });
  });

  categoryButtons.forEach((button) => {
    button.addEventListener('click', () => {
      activeCategory = button.getAttribute('data-manual-order-category') || 'all';

      categoryButtons.forEach((categoryButton) => {
        const isSelected = categoryButton === button;

        categoryButton.classList.toggle('border-gold', isSelected);
        categoryButton.classList.toggle('bg-gold', isSelected);
        categoryButton.classList.toggle('text-black', isSelected);

        categoryButton.classList.toggle('border-white/10', !isSelected);
        categoryButton.classList.toggle('bg-black/30', !isSelected);
        categoryButton.classList.toggle('text-cream', !isSelected);
      });

      renderManualOrderMenu();
    });
  });

  overlay.addEventListener('click', (event) => {
    const target = event.target instanceof Element ? event.target : event.target?.parentElement;

    if (!target) return;

    const addButton = target.closest('[data-manual-order-add-item]');
    const decreaseButton = target.closest('[data-manual-order-decrease]');
    const increaseButton = target.closest('[data-manual-order-increase]');
    const removeButton = target.closest('[data-manual-order-remove]');

    if (addButton) {
      clearManualOrderFormError();

      const itemId = addButton.getAttribute('data-manual-order-add-item') || '';
      const menuItem = menuItems.find((item) => String(item.id) === String(itemId));

      if (!menuItem) return;

      const existingItem = cartItems.find((item) => String(item.id) === String(menuItem.id));

      if (existingItem) {
        existingItem.quantity = Number(existingItem.quantity || 1) + 1;
      } else {
        cartItems.push({
          ...menuItem,
          quantity: 1
        });
      }

      renderManualOrderCart(itemId);
      return;
    }

    if (decreaseButton) {
      const itemId = decreaseButton.getAttribute('data-manual-order-decrease') || '';

      cartItems = cartItems
        .map((item) =>
          String(item.id) === String(itemId)
            ? { ...item, quantity: Math.max(0, Number(item.quantity || 1) - 1) }
            : item
        )
        .filter((item) => Number(item.quantity || 0) > 0);

      renderManualOrderCart(itemId);
      return;
    }

    if (increaseButton) {
      const itemId = increaseButton.getAttribute('data-manual-order-increase') || '';

      cartItems = cartItems.map((item) =>
        String(item.id) === String(itemId)
          ? { ...item, quantity: Number(item.quantity || 1) + 1 }
          : item
      );

      renderManualOrderCart(itemId);
      return;
    }

    if (removeButton) {
      const itemId = removeButton.getAttribute('data-manual-order-remove') || '';

      cartItems = cartItems.filter((item) => String(item.id) !== String(itemId));

      renderManualOrderCart();
    }
  });

  form?.addEventListener('submit', async (event) => {
    event.preventDefault();

    const currentTexts = getManualOrderTexts();

    if (manualOrderStep !== 'cashier') {
      if (validateManualOrderInfoStep()) {
        setManualOrderStep('cashier');
      }

      return;
    }

    if (!validateManualOrderInfoStep()) {
      return;
    }

    if (!cartItems.length) {
      showManualOrderFormError(currentTexts.itemsRequired);
      return;
    }

    if (submitButton) {
      submitButton.disabled = true;
      submitButton.classList.add('opacity-60', 'pointer-events-none');
    }

    const localManualOrder = buildManualOrderRequestFromForm(form, cartItems);
    const syncedManualOrder = await createManualOrderInSupabase(localManualOrder);

    if (!syncedManualOrder.liveRequestId) {
      console.warn(
        'TapCarta Restaurant: commande manuelle non enregistrée, synchronisation Supabase non confirmée.',
        syncedManualOrder
      );

      if (submitButton) {
        submitButton.disabled = false;
        submitButton.classList.remove('opacity-60', 'pointer-events-none');
      }

      showManualOrderFormError(
        'Impossible d’enregistrer la commande pour le moment. Réessayez dans quelques instants.'
      );

      return;
    }

    saveManualOrderToLocalStorage(syncedManualOrder);

    overlay.remove();

    syncRequestsState();
    renderMenu();

    void playRestaurantManualConfirmationSound();

    showRestaurantToast(currentTexts.saved, 'info');
  });

  renderManualOrderCart();
  setManualOrderStep('info');

  if (window.lucide) {
    requestAnimationFrame(() => lucide.createIcons());
  }

  window.setTimeout(() => {
    overlay.querySelector('input[name="customerName"]')?.focus();
  }, 80);
}

function removeRequestDetailsModal() {
  const existingModal = document.getElementById('restaurant-request-details-modal');
  if (existingModal) {
    existingModal.remove();
  }
}

function removeRequestActionModal() {
  const existingModal = document.getElementById('restaurant-request-action-modal');
  if (existingModal) {
    existingModal.remove();
  }
}

function formatRequestAmount(amount) {
  return typeof amount === 'number'
    ? `${amount.toFixed(2).replace('.', ',')} €`
    : '-';
}

function escapeRequestDetailsHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

function getRequestActionPresets(isOrder, mode, targetLang = currentLang, hasProposedTime = false) {
  const actionTextsByLang = (lang) => {
    if (lang === 'es') {
      return {
        otherReason: 'Otro',
        modifiedOrderDefault: hasProposedTime
          ? 'El restaurante le ha propuesto una adaptación de su pedido.'
          : 'El restaurante le propone una adaptación de su pedido.',
        modifiedBookingDefault: hasProposedTime
          ? 'El restaurante le ha propuesto una adaptación de su reserva.'
          : 'El restaurante le propone una adaptación de su reserva.',
        cancelledOrderDefault: 'Pedido cancelado por el restaurante.',
        cancelledBookingDefault: 'Reserva cancelada por el restaurante.'
      };
    }

    if (lang === 'en') {
      return {
        otherReason: 'Other',
        modifiedOrderDefault: hasProposedTime
          ? 'The restaurant has proposed an adjustment to your order.'
          : 'The restaurant proposes an adjustment to your order.',
        modifiedBookingDefault: hasProposedTime
          ? 'The restaurant has proposed an adjustment to your booking.'
          : 'The restaurant proposes an adjustment to your booking.',
        cancelledOrderDefault: 'Order cancelled by the restaurant.',
        cancelledBookingDefault: 'Booking cancelled by the restaurant.'
      };
    }

    if (lang === 'nl') {
      return {
        otherReason: 'Andere',
        modifiedOrderDefault: hasProposedTime
          ? 'Het restaurant heeft een aanpassing van uw bestelling voorgesteld.'
          : 'Het restaurant stelt een aanpassing van uw bestelling voor.',
        modifiedBookingDefault: hasProposedTime
          ? 'Het restaurant heeft een aanpassing van uw reservatie voorgesteld.'
          : 'Het restaurant stelt een aanpassing van uw reservatie voor.',
        cancelledOrderDefault: 'Bestelling geannuleerd door het restaurant.',
        cancelledBookingDefault: 'Reservatie geannuleerd door het restaurant.'
      };
    }

    return {
      otherReason: 'Autre',
      modifiedOrderDefault: hasProposedTime
        ? 'Le restaurant vous a proposé une adaptation de votre commande.'
        : 'Le restaurant vous propose une adaptation de votre commande.',
      modifiedBookingDefault: hasProposedTime
        ? 'Le restaurant vous a proposé une adaptation de votre réservation.'
        : 'Le restaurant vous propose une adaptation de votre réservation.',
      cancelledOrderDefault: 'Commande annulée par le restaurant.',
      cancelledBookingDefault: 'Réservation annulée par le restaurant.'
    };
  };

window.closeRequestActionModal = function() {
  removeRequestActionModal();
};

window.openRequestActionModal = function(requestId, mode) {
  const item = requestsData.find((entry) => String(entry.id) === String(requestId));

  if (!item || !item.sourceRequest) {
    alert(t.restaurantRequestNotFound);
    return;
  }

  removeRequestActionModal();
  document.body.insertAdjacentHTML('beforeend', buildRequestActionModalHtml(item, mode));

  const modal = document.getElementById('restaurant-request-action-modal');
  const reasonSelect = document.getElementById('restaurant-request-action-reason');
  const messageField = document.getElementById('restaurant-request-action-message');
  const timeField = document.getElementById('restaurant-request-action-time');
  const source = item.sourceRequest || {};
  const isOrder = !!source?.order;
  const clientLang = source?.customer?.language || currentLang;

  function getCurrentPresets() {
    const proposedTime = timeField ? String(timeField.value || '').trim() : '';
    return getRequestActionPresets(isOrder, mode, clientLang, !!proposedTime);
  }

  function syncMessageWithReason(forceReplace = false) {
    if (!reasonSelect || !messageField) return;

    const selectedPreset = getCurrentPresets().find((entry) => entry.reason === reasonSelect.value);
    if (!selectedPreset) return;

    if (forceReplace || !messageField.value.trim()) {
      messageField.value = selectedPreset.message || '';
    }
  }

  if (reasonSelect && messageField) {
    reasonSelect.addEventListener('change', () => syncMessageWithReason(true));
  }

  if (timeField && reasonSelect && messageField && mode === 'modify') {
    timeField.addEventListener('change', () => syncMessageWithReason(true));
    timeField.addEventListener('input', () => syncMessageWithReason(true));
  }

  if (modal) {
    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        closeRequestActionModal();
      }
    });
  }
};

window.submitRequestAction = async function(requestId, mode) {
  const item = requestsData.find((entry) => String(entry.id) === String(requestId));

  if (!item || !item.sourceRequest) {
    alert(t.restaurantRequestNotFound);
    return;
  }

  const previousItemState = {
    treated: item.treated,
    status: item.status,
    sourceRequest: {
      ...item.sourceRequest,
      restaurantResponse: {
        ...(item.sourceRequest.restaurantResponse || {})
      }
    }
  };

  const reasonField = document.getElementById('restaurant-request-action-reason');
  const messageField = document.getElementById('restaurant-request-action-message');
  const timeField = document.getElementById('restaurant-request-action-time');
  const texts = getRequestActionTexts();

  const reason = reasonField ? String(reasonField.value || 'other') : 'other';
  const message = messageField ? String(messageField.value || '').trim() : '';
  const proposedTime = timeField ? String(timeField.value || '').trim() : '';

  if (!message) {
    alert(texts.messageRequired);
    return;
  }

  const nowIso = new Date().toISOString();

  if (mode === 'modify') {
    item.treated = false;
    item.status = t.restaurantStatusPending || 'Pending client response';
  } else {
    item.treated = true;
    item.status = t.restaurantStatusProcessed;
  }

  item.sourceRequest.status = mode === 'modify' ? 'modified' : 'cancelled';
  item.sourceRequest.updatedAt = nowIso;

  if (mode === 'modify') {
    item.sourceRequest.modifiedAt = nowIso;
  }

  if (mode === 'cancel') {
    item.sourceRequest.cancelledAt = nowIso;
  }

  item.sourceRequest.restaurantResponse = {
    ...(item.sourceRequest.restaurantResponse || {}),
    reason,
    message,
    updatedBy: 'restaurant',
    actionType: mode,
    proposal: mode === 'modify'
      ? {
          ...(item.sourceRequest.restaurantResponse?.proposal || {}),
          proposedTime: proposedTime || null
        }
      : null
  };

  const persisted = await persistRestaurantRequestUpdate(item.sourceRequest);

  if (!persisted) {
    item.treated = previousItemState.treated;
    item.status = previousItemState.status;
    item.sourceRequest = previousItemState.sourceRequest;

    showRestaurantToast(
      currentLang === 'es'
        ? 'Acción no guardada. Comprueba la conexión e inténtalo de nuevo.'
        : currentLang === 'en'
          ? 'Action not saved. Check the connection and try again.'
          : currentLang === 'nl'
            ? 'Actie niet opgeslagen. Controleer de verbinding en probeer opnieuw.'
            : 'Action non enregistrée. Vérifiez la connexion et réessayez.',
      'danger'
    );

    renderMenu();
    return;
  }

  closeRequestActionModal();
  closeRequestDetailsModal();
  syncRequestsState();
  dismissRestaurantNewRequestNotification();
  renderMenu();
};

window.openRequestDetails = function(requestId) {
  const item = requestsData.find((entry) => String(entry.id) === String(requestId));

  if (!item || !item.sourceRequest) {
    alert(t.restaurantRequestDetailsNotFound);
    return;
  }

  removeRequestDetailsModal();
  document.body.insertAdjacentHTML('beforeend', buildRequestDetailsModalHtml(item));

  const modal = document.getElementById('restaurant-request-details-modal');
  if (modal) {
    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        closeRequestDetailsModal();
      }
    });
  }
