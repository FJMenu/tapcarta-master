  <script>
let siteConfig = {
  appLogoUrl: "./logo-app-web-sans-fond.png",
  faviconUrl: "./favicon.png",
  productName: "TapCarta",
  productSignature: "Interface restaurant",
  restaurantName: "La Bonne Fourchette",
  restaurantStatusLabel: "Interface restaurant premium",
  reviewWriteUrl: "https://search.google.com/local/writereview?placeid=ChIJ3b0pGDb7wEcRs2VnXGk2mmE",
  reviewReadUrl: "https://www.google.com/search?sca_esv=53ad354dfa12427d&hl=es&sxsrf=ANbL-n6RWE3nRUw7f5WaezPnpcLHuoMqxQ:1775912350506&q=Cabinet+Dentaire+Oksuz&si=AL3DRZEsmMGCryMMFSHJ3StBhOdZ2-6yYkXd_doETEE1OR-qOa4msx7_krR5S5qlB2qNyHs2EArzfB-f6wFFsvXUzF_YL4uf-_g20LPRvAwkA6WCRMsotxQ%3D&uds=ALYpb_kTpE9zdcnRXvuX97Rkoz7XTeKzW--6OACk50lLBISshA1RYyql69TuTGCD1oLi-ge1ZOQa0xzvzOPnc_YCmxERJQBS992uA1TMgs4UU4qhONi-YNgDewOxLmRRJU_0Y5Ly99tX&sa=X&ved=2ahUKEwifmLeG7eWTAxWeT6QEHQTJKD8Q3PALegQIGhAE&biw=1536&bih=695&dpr=1.25",
  reviewUrl: "https://search.google.com/local/writereview?placeid=ChIJ3b0pGDb7wEcRs2VnXGk2mmE",
  desktopCollageUrl: "./liege-collage.jpg",
  clientMenuUrl: "#",
  qrMenuUrl: "#",
  experienceUrl: "#",
  orderReservationOptionEnabled: true,
  activationRequestUrl: "#"
};

let activeRestaurantData = null;

async function fetchJsonFile(path) {
  const response = await fetch(`${path}?v=${APP_VERSION}`, { cache: 'no-store' });

  if (!response.ok) {
    throw new Error(`Impossible de charger ${path}`);
  }

  return response.json();
}

async function loadActiveRestaurantData() {
  const restaurantsIndex = await fetchJsonFile('./restaurants/index.json');

  const restaurantsList = Array.isArray(restaurantsIndex)
    ? restaurantsIndex
    : Array.isArray(restaurantsIndex.restaurants)
      ? restaurantsIndex.restaurants
      : [];

  const activeRestaurant = restaurantsList.find(item => item.status === 'active');

  if (!activeRestaurant || !activeRestaurant.id) {
    throw new Error('Aucun établissement actif trouvé.');
  }

  const restaurantFilePath = activeRestaurant.file
    ? `./${activeRestaurant.file.replace(/^\.?\//, '')}`
    : `./restaurants/${activeRestaurant.id}.json`;

  const restaurantData = await fetchJsonFile(restaurantFilePath);

  if (restaurantData?.identity?.id) {
    try {
      const { data: liveMenuRow, error: liveMenuError } = await supabaseClient
        .from('restaurant_menus')
        .select('menu_json, menu_version, updated_at')
        .eq('restaurant_id', restaurantData.identity.id)
        .maybeSingle();

      if (liveMenuError) {
        throw liveMenuError;
      }

      if (liveMenuRow?.menu_json && typeof liveMenuRow.menu_json === 'object') {
        restaurantData.menu = {
          ...liveMenuRow.menu_json,
          menuVersion:
            liveMenuRow.menu_version ??
            liveMenuRow.menu_json?.menuVersion ??
            restaurantData?.menu?.menuVersion ??
            null,
          updatedAt:
            liveMenuRow.updated_at ??
            liveMenuRow.menu_json?.updatedAt ??
            restaurantData?.menu?.updatedAt ??
            null
        };
      }
    } catch (error) {
      console.error('Erreur lecture menu live Supabase côté restaurant :', error);
    }
  }

  siteConfig.restaurantName =
    restaurantData?.identity?.name ||
    restaurantData?.name ||
    activeRestaurant.name ||
    siteConfig.restaurantName;

const restaurantLifecycle =
  restaurantData?.status?.lifecycle ||
  restaurantData?.identity?.status ||
  'active';

const isRestaurantActive = restaurantLifecycle === 'active';

siteConfig.modules = {
  ordering: isRestaurantActive && restaurantData?.modules?.ordering !== false,
  booking: isRestaurantActive && restaurantData?.modules?.booking !== false,
  googleReviews: isRestaurantActive && restaurantData?.modules?.googleReviews !== false,
  whatsapp: isRestaurantActive && restaurantData?.modules?.whatsapp !== false,
  web: isRestaurantActive && restaurantData?.modules?.web === true
};

siteConfig.orderReservationOptionEnabled =
  siteConfig.modules.ordering || siteConfig.modules.booking;

const resolvedClientMenuUrl =
  restaurantData?.technical?.clientMenuUrl ||
  restaurantData?.portal?.portalPaths?.publicPage ||
  restaurantData?.links?.clientMenuUrl ||

  (restaurantData?.identity?.id === 'tapcarta-demo'

const supportedLangs = ['fr', 'es', 'en', 'nl'];
const LANGUAGE_STORAGE_KEY = 'tapcarta-selected-language';

function detectLanguage() {
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  if (urlLang && supportedLangs.includes(urlLang)) {
    localStorage.setItem(LANGUAGE_STORAGE_KEY, urlLang);
    return urlLang;
  }

  const savedLang = localStorage.getItem(LANGUAGE_STORAGE_KEY);
  if (savedLang && supportedLangs.includes(savedLang)) {
    return savedLang;
  }

  const browserLang = (navigator.language || navigator.userLanguage || 'es').substring(0, 2).toLowerCase();
  return supportedLangs.includes(browserLang) ? browserLang : 'es';
}

    function updateInstallUI() {
      const installBtn = document.getElementById('install-app-btn');
      const iosHelp = document.getElementById('ios-install-help');
      const installTexts = getInstallAppTexts();

      if (!installBtn) return;

      const buttonSpan = installBtn.querySelector('span');
      if (buttonSpan) {
        buttonSpan.textContent = installTexts.button;
      }

      if (isInStandaloneMode()) {
        installBtn.hidden = true;
        if (iosHelp) {
          iosHelp.hidden = true;
          iosHelp.innerHTML = '';
        }
        return;
      }

      if (isSamsungInternet() || deferredInstallPrompt || isIos() || isAndroid()) {
        installBtn.hidden = false;
      } else {
        installBtn.hidden = true;
      }

      if (iosHelp) {
        iosHelp.hidden = true;
      }
    }

    function showInstallToast() {
      if (installToastAlreadyShown) return;

      const toast = document.getElementById('install-toast');
      const title = document.getElementById('install-toast-title');
      const text = document.getElementById('install-toast-text');
      const t = translations[currentLang];

      if (!toast || !title || !text) return;

      installToastAlreadyShown = true;
      title.textContent = t.installToastTitle;
      text.textContent = t.installToastText;
      toast.classList.add('show');

      if (window.lucide) {
        requestAnimationFrame(() => {
          lucide.createIcons();
        });
      }

      clearTimeout(installToastTimeout);
      installToastTimeout = setTimeout(() => {
        toast.classList.remove('show');
        installToastAlreadyShown = false;
      }, 3200);
    }

    async function handleInstallClick() {
      const iosHelp = document.getElementById('ios-install-help');
      const installTexts = getInstallAppTexts();

      const toggleHelp = (html) => {
        if (!iosHelp) return;

        if (!iosHelp.hidden) {
          clearTimeout(installHelpTimeout);
          iosHelp.hidden = true;
          return;
        }

        clearTimeout(installHelpTimeout);
        iosHelp.hidden = false;
        iosHelp.innerHTML = html;
        iosHelp.scrollIntoView({ behavior: 'smooth', block: 'center' });

        installHelpTimeout = setTimeout(() => {
          iosHelp.hidden = true;
        }, 15000);
      };

      if (isSamsungInternet()) {
        toggleHelp(installTexts.samsungHelp);
        return;
      }

      if (deferredInstallPrompt) {
        installToastAlreadyShown = false;
        deferredInstallPrompt.prompt();

        try {
          const choiceResult = await deferredInstallPrompt.userChoice;

          if (choiceResult && choiceResult.outcome === 'accepted') {
            clearTimeout(installFallbackTimeout);
            installFallbackTimeout = setTimeout(() => {
              if (isInStandaloneMode()) {
                showInstallToast();
              }
            }, 1200);
          } else {
            if (isAndroid()) {
              toggleHelp(installTexts.androidHelp);
            }
          }
        } catch (_) {
          if (isAndroid()) {
            toggleHelp(installTexts.androidHelp);
          }
        }

        deferredInstallPrompt = null;
        updateInstallUI();
        return;
      }

      if (isIos() && !isInStandaloneMode()) {
        toggleHelp(installTexts.iosHelp);
        return;
      }

      if (isAndroid() && !isInStandaloneMode()) {
        toggleHelp(installTexts.androidHelp);
      }
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;

      if (!isSamsungInternet()) {
        updateInstallUI();
      }
    });

    window.addEventListener('appinstalled', () => {
      clearTimeout(installFallbackTimeout);
      deferredInstallPrompt = null;
      updateInstallUI();
      showInstallToast();
    });

function addToCart(itemId) {

  if (existingItem) {
    existingItem.quantity += 1;
  } else {
    cart.push({ id: itemId, quantity: 1 });
  }

  renderMenu();
}

function validateOrderReview() {
  const t = translations[currentLang];

  const name = (orderForm.name || '').trim();
  const phone = (orderForm.phone || '').trim();

  const time = (orderForm.time || '').trim();

  if (!cart.length) {

    orderReviewOpen = false;
    renderMenu();
    return;

  if (!name || !phone || !date || !time) {
    alert(`${t.orderFormTitle}\n\n- ${t.orderFormName}\n- ${t.orderFormPhone}\n- ${t.orderFormDate}\n- ${t.orderFormTime}`);
    return;
  }

  alert(`${t.reviewTitle}\n\n${t.reviewPendingMessage}`);
}

function removeFromCart(itemId) {
  const existingItem = cart.find(item => item.id === itemId);

  if (!existingItem) return;

  existingItem.quantity -= 1;

  if (existingItem.quantity <= 0) {
    cart = cart.filter(item => item.id !== itemId);
  }

  if (!cart.length) {
    orderReviewOpen = false;
  }

  renderMenu();
}

function getDefaultOrderDateTime() {
  const now = new Date();
  const target = new Date(now.getTime() + 60 * 60 * 1000);

  const minutes = target.getMinutes();
  const roundedMinutes = Math.ceil(minutes / 10) * 10;

  if (roundedMinutes === 60) {
    target.setHours(target.getHours() + 1);
    target.setMinutes(0, 0, 0);
  } else {
    target.setMinutes(roundedMinutes, 0, 0);
  }

  const year = target.getFullYear();
  const month = String(target.getMonth() + 1).padStart(2, '0');
  const day = String(target.getDate()).padStart(2, '0');
  const hours = String(target.getHours()).padStart(2, '0');
  const finalMinutes = String(target.getMinutes()).padStart(2, '0');

  return {
    date: `${year}-${month}-${day}`,
    time: `${hours}:${finalMinutes}`
  };
}

function initializeOrderForm() {
  const defaults = getDefaultOrderDateTime();

  orderForm = {
    name: '',
    phone: '',
    date: defaults.date,
    time: defaults.time,
    note: ''
  };
}

function getMinuteOptions() {

function getOrderFormTimeParts() {
  const [hours = '00', minutes = '00'] = (orderForm.time || '00:00').split(':');
  return { hours, minutes };
}

function updateOrderFormTimePart(part, value) {
  const currentParts = getOrderFormTimeParts();

  orderForm = {

  };

  renderMenu();
}

function loadRestaurantRequests() {
  const bookingStorageKey = 'tapcarta_booking_requests';
  const orderStorageKey = 'tapcarta_order_requests';
  const historyRetentionMs = 30 * 24 * 60 * 60 * 1000;
  const activeRestaurantId =
    activeRestaurantData?.identity?.id ||
    activeRestaurantData?.id ||
    siteConfig?.identity?.id ||
    '';

  function getHistoryReferenceTimestamp(item) {
    const rawValue =
      item?.historyUpdatedAt ||
      item?.updatedAt ||
      item?.confirmedAt ||
      item?.cancelledAt ||
      item?.createdAt;

    const parsedValue = rawValue ? new Date(rawValue).getTime() : NaN;
    return Number.isFinite(parsedValue) ? parsedValue : Date.now();
  }

  function shouldAutoDeleteHistory(item, pendingStatus) {
    if (!item || item.status === pendingStatus) return false;
    if (item.historyDeleted === true) return true;
    return (Date.now() - getHistoryReferenceTimestamp(item)) > historyRetentionMs;
  }

  function normalizeRequestItem(item, requestType, pendingStatus, typeLabel) {
    return {
      id: item.requestId || `${requestType}_${Date.now()}`,
      type: typeLabel,
      client: item.customer?.name || 'Client',
      createdAt: item.createdAt ? new Date(item.createdAt).getTime() : Date.now(),
      status: item.status === pendingStatus ? t.restaurantStatusNew : t.restaurantStatusProcessed,
      treated: item.status !== pendingStatus,
      sourceRequest: item
    };
  }

  try {
    const rawBookings = localStorage.getItem(bookingStorageKey);
    const parsedBookings = rawBookings ? JSON.parse(rawBookings) : [];

    const rawOrders = localStorage.getItem(orderStorageKey);
    const parsedOrders = rawOrders ? JSON.parse(rawOrders) : [];

    const safeBookings = Array.isArray(parsedBookings) ? parsedBookings : [];
    const safeOrders = Array.isArray(parsedOrders) ? parsedOrders : [];

    const cleanedBookings = safeBookings.filter((item) => !shouldAutoDeleteHistory(item, 'pending'));
    const cleanedOrders = safeOrders.filter((item) => !shouldAutoDeleteHistory(item, 'sent'));

    if (cleanedBookings.length !== safeBookings.length) {
      localStorage.setItem(bookingStorageKey, JSON.stringify(cleanedBookings));
    }

    if (cleanedOrders.length !== safeOrders.length) {
      localStorage.setItem(orderStorageKey, JSON.stringify(cleanedOrders));
    }

    const bookings = cleanedBookings
      .filter(
        (item) =>
          item &&
          item.requestType === 'booking' &&
          String(item.restaurantId || '') === String(activeRestaurantId)
      )
      .map((item) => normalizeRequestItem(item, 'booking', 'pending', t.restaurantTypeBooking));

    const orders = cleanedOrders
      .filter(
        (item) =>
          item &&
          String(item.restaurantId || '') === String(activeRestaurantId)
      )
      .map((item) => normalizeRequestItem(item, 'order', 'sent', t.restaurantTypeOrder));

    return [...orders, ...bookings].sort((a, b) => b.createdAt - a.createdAt);
  } catch (error) {
    console.warn('TapCarta Restaurant: impossible de lire les demandes Standard', error);
    return [];
  }
}

function getElapsedLabel(item) {
  const diffMs = Math.max(0, Date.now() - item.createdAt);
  const diffSeconds = Math.floor(diffMs / 1000);

  if (diffSeconds < 30) return t.restaurantReceivedNow;
  if (diffSeconds < 60) return t.restaurantReceived30Sec;

  const roundedSeconds = Math.floor(diffSeconds / 30) * 30;

  const hours = Math.floor(roundedSeconds / 3600);
  const remainingSecondsAfterHours = roundedSeconds % 3600;
  const minutes = Math.floor(remainingSecondsAfterHours / 60);
  const seconds = remainingSecondsAfterHours % 60;

  let timeLabel = '';

  if (hours > 0) {
    if (minutes === 0 && seconds === 0) {
      timeLabel = `${hours} h`;
    } else if (seconds === 0) {
      timeLabel = `${hours} h ${minutes} min`;
    } else {
      timeLabel = `${hours} h ${minutes} min 30`;
    }
  } else {
    timeLabel = seconds === 0 ? `${minutes} min` : `${minutes} min 30`;
  }

  return t.restaurantReceivedMinutes.replace('{time}', timeLabel);
}

function persistRestaurantRequestUpdate(updatedRequest) {
  const isOrderRequest = !!updatedRequest?.order;
  const storageKey = isOrderRequest ? 'tapcarta_order_requests' : 'tapcarta_booking_requests';
  const lastKey = isOrderRequest ? 'tapcarta_last_order_request' : 'tapcarta_last_booking_request';

  try {
    const raw = localStorage.getItem(storageKey);
    const parsed = raw ? JSON.parse(raw) : [];

    if (!Array.isArray(parsed)) return;

    const updatedList = parsed.map((entry) => {
      if (String(entry?.requestId) !== String(updatedRequest?.requestId)) {
        return entry;
      }

      return {
        ...entry,
        status: updatedRequest.status || entry.status,
        updatedAt: updatedRequest.updatedAt || entry.updatedAt || new Date().toISOString(),
        confirmedAt: updatedRequest.confirmedAt || entry.confirmedAt,
        cancelledAt: updatedRequest.cancelledAt || entry.cancelledAt,
        historyDeleted: updatedRequest.historyDeleted === true ? true : entry.historyDeleted === true,
        historyUpdatedAt: updatedRequest.historyUpdatedAt || entry.historyUpdatedAt,
        restaurantResponse: {
          ...(entry.restaurantResponse || {}),
          ...(updatedRequest.restaurantResponse || {})
        }
      };
    });

    localStorage.setItem(storageKey, JSON.stringify(updatedList));

    const lastRaw = localStorage.getItem(lastKey);
    const lastParsed = lastRaw ? JSON.parse(lastRaw) : null;

    if (lastParsed && String(lastParsed.requestId) === String(updatedRequest?.requestId)) {
      localStorage.setItem(
        lastKey,
        JSON.stringify({
          ...lastParsed,
          status: updatedRequest.status || lastParsed.status,
          updatedAt: updatedRequest.updatedAt || lastParsed.updatedAt || new Date().toISOString(),
          confirmedAt: updatedRequest.confirmedAt || lastParsed.confirmedAt,
          cancelledAt: updatedRequest.cancelledAt || lastParsed.cancelledAt,
          historyDeleted: updatedRequest.historyDeleted === true ? true : lastParsed.historyDeleted === true,
          historyUpdatedAt: updatedRequest.historyUpdatedAt || lastParsed.historyUpdatedAt,
          restaurantResponse: {
            ...(lastParsed.restaurantResponse || {}),
            ...(updatedRequest.restaurantResponse || {})
          }
        })
      );
    }
  } catch (error) {
    console.warn('TapCarta Restaurant: impossible de persister la mise à jour de demande', error);
  }
}

  item.sourceRequest.confirmedAt = nowIso;
  item.sourceRequest.restaurantResponse = {
    ...(item.sourceRequest.restaurantResponse || {}),
    reason: 'confirmed',
    message: confirmationMessage,
    updatedBy: 'restaurant'
  };

  persistRestaurantRequestUpdate(item.sourceRequest);
  renderMenu();
};

window.deleteRequestFromHistory = function(requestId) {
  const item = requestsData.find((entry) => String(entry.id) === String(requestId));

  if (!item || !item.sourceRequest) {
    alert('Demande introuvable.');
    return;
  }

  const confirmedDelete = window.confirm('Supprimer cette demande de l’historique ?');

  if (!confirmedDelete) {
    return;
  }

  const nowIso = new Date().toISOString();

  item.sourceRequest.historyDeleted = true;
  item.sourceRequest.historyUpdatedAt = nowIso;
  item.sourceRequest.updatedAt = nowIso;

  persistRestaurantRequestUpdate(item.sourceRequest);
  renderMenu();
};

  function ensureRestaurantMenuShape() {
    if (!activeRestaurantData || typeof activeRestaurantData !== 'object') return;

    if (!activeRestaurantData.menu || typeof activeRestaurantData.menu !== 'object') {
      activeRestaurantData.menu = {};
    }

    if (!Array.isArray(activeRestaurantData.menu.categories)) {
      activeRestaurantData.menu.categories = [];
    }

    if (typeof activeRestaurantData.menu.menuVersion !== 'number') {
      activeRestaurantData.menu.menuVersion = 1;
    }

    if (typeof activeRestaurantData.menu.updatedAt !== 'string') {
      activeRestaurantData.menu.updatedAt = '';
    }

    activeRestaurantData.menu.categories = activeRestaurantData.menu.categories.map((category, categoryIndex) => {
      const normalizedCategory = category && typeof category === 'object' ? category : {};

      if (typeof normalizedCategory.id !== 'string') {
        normalizedCategory.id = `categorie-${categoryIndex + 1}`;
      }

      if (typeof normalizedCategory.name !== 'string') {
        normalizedCategory.name = '';
      }

      if (typeof normalizedCategory.order !== 'number') {
        normalizedCategory.order = categoryIndex + 1;
      }

      if (typeof normalizedCategory.visible !== 'boolean') {
        normalizedCategory.visible = true;
      }

      if (!Array.isArray(normalizedCategory.items)) {
        normalizedCategory.items = [];
      }

      normalizedCategory.items = normalizedCategory.items.map((item, itemIndex) => {
        const normalizedItem = item && typeof item === 'object' ? item : {};

        if (typeof normalizedItem.id !== 'string') {
          normalizedItem.id = `item-${categoryIndex + 1}-${itemIndex + 1}`;
        }

        if (typeof normalizedItem.name !== 'string') {
          normalizedItem.name = '';
        }

        if (typeof normalizedItem.subtitle !== 'string') {
          normalizedItem.subtitle = '';
        }

        if (typeof normalizedItem.price !== 'number') {
          normalizedItem.price = 0;
        }

        if (typeof normalizedItem.visible !== 'boolean') {
          normalizedItem.visible = true;
        }

        if (typeof normalizedItem.available !== 'boolean') {
          normalizedItem.available = true;
        }

        if (typeof normalizedItem.order !== 'number') {
          normalizedItem.order = itemIndex + 1;
        }

        if (typeof normalizedItem.updatedAt !== 'string') {
          normalizedItem.updatedAt = activeRestaurantData.menu.updatedAt || '';
        }

        return normalizedItem;
      });

      return normalizedCategory;
    });
  }

  function addRestaurantItemToCategory(categoryIndex) {

  function addRestaurantCategory() {
    ensureRestaurantMenuShape();

    const canonicalCategories = [
      { id: 'snacks', name: 'Snacks' },
      { id: 'entrees', name: 'Entrées' },
      { id: 'plats', name: 'Plats' },
      { id: 'moules', name: 'Moules' },
      { id: 'desserts', name: 'Desserts' },
      { id: 'crepes', name: 'Crêpes' },
      { id: 'suggestions', name: 'Suggestions' },
      { id: 'supplements', name: 'Suppléments' },
      { id: 'boissons', name: 'Boissons' }
    ];

    const existingIds = new Set(
      activeRestaurantData.menu.categories.map((category) => category.id)
    );

    const nextCategory = canonicalCategories.find((category) => !existingIds.has(category.id));

    if (!nextCategory) {
      alert('Toutes les catégories standard compatibles sont déjà créées.');
      return;
    }

    activeRestaurantData.menu.categories.unshift({
      id: nextCategory.id,
      name: nextCategory.name,
      order: 1,
      visible: true,
      items: []
    });

    markMenuTranslationWarningNeeded();
    syncRestaurantCategoryOrder();
    renderRestaurantMenuEditor();
  }

  function moveRestaurantItem(categoryIndex, itemIndex, direction) {
    if (!activeRestaurantData?.menu?.categories?.[categoryIndex]?.items) return;

    const category = activeRestaurantData.menu.categories[categoryIndex];
    const items = category.items;
    const targetIndex = direction === 'up' ? itemIndex - 1 : itemIndex + 1;

    if (targetIndex < 0 || targetIndex >= items.length) return;

    [items[itemIndex], items[targetIndex]] = [items[targetIndex], items[itemIndex]];
    syncRestaurantItemOrder(category);
    renderRestaurantMenuEditor();
  }

  function moveRestaurantCategory(categoryIndex, direction) {
    if (!activeRestaurantData?.menu?.categories) return;

    const categories = activeRestaurantData.menu.categories;
    const targetIndex = direction === 'up' ? categoryIndex - 1 : categoryIndex + 1;

    if (targetIndex < 0 || targetIndex >= categories.length) return;

    [categories[categoryIndex], categories[targetIndex]] = [categories[targetIndex], categories[categoryIndex]];
    syncRestaurantCategoryOrder();
    renderRestaurantMenuEditor();
  }

  function deleteRestaurantItem(categoryIndex, itemIndex) {
    if (!activeRestaurantData?.menu?.categories?.[categoryIndex]?.items) return;

    const category = activeRestaurantData.menu.categories[categoryIndex];
    category.items.splice(itemIndex, 1);
    syncRestaurantItemOrder(category);
    renderRestaurantMenuEditor();
  }

  function deleteRestaurantCategory(categoryIndex) {
    if (!activeRestaurantData?.menu?.categories?.[categoryIndex]) return;

    activeRestaurantData.menu.categories.splice(categoryIndex, 1);
    syncRestaurantCategoryOrder();
    renderRestaurantMenuEditor();
  }

  async function exportRestaurantJson() {
    if (!activeRestaurantData) return;

    ensureRestaurantMenuShape();

    if (menuTranslationWarningNeeded) {
      alert(
        currentLang === 'es'
          ? 'Atención: los nuevos textos añadidos al menú no se traducen automáticamente. Si su menú existe en varios idiomas, las traducciones deberán actualizarse manualmente si lo desea.'
          : currentLang === 'en'
            ? 'Warning: new texts added to the menu are not translated automatically. If your menu exists in several languages, translations will need to be updated manually if you wish.'
            : currentLang === 'nl'
              ? 'Let op: nieuwe teksten die aan het menu worden toegevoegd, worden niet automatisch vertaald. Als uw menu in meerdere talen bestaat, moeten de vertalingen handmatig worden bijgewerkt als u dat wenst.'
              : 'Attention : les nouveaux textes ajoutés au menu ne sont pas traduits automatiquement. Si votre menu existe en plusieurs langues, les traductions devront être mises à jour manuellement si vous le souhaitez.'
      );
    }

    const previousMenuSnapshot = JSON.stringify(activeRestaurantData.menu || {});
    const nowIso = new Date().toISOString();

    if (activeRestaurantData.menu?.categories?.length) {
      activeRestaurantData.menu.menuVersion = Math.max((activeRestaurantData.menu.menuVersion || 0) + 1, 1);
      activeRestaurantData.menu.updatedAt = nowIso;

      activeRestaurantData.menu.categories.forEach((category) => {
        if (!Array.isArray(category.items)) return;
        category.items.forEach((item) => {
          item.updatedAt = nowIso;
        });
      });
    }

    const nextMenuSnapshot = JSON.stringify(activeRestaurantData.menu || {});
    if (previousMenuSnapshot === nextMenuSnapshot && !activeRestaurantData.menu.updatedAt) {
      activeRestaurantData.menu.updatedAt = nowIso;
    }

    const restaurantId =
      activeRestaurantData?.identity?.id ||
      activeRestaurantData?.id ||
      'restaurant';

    const saveButton = document.getElementById('restaurant-save-menu-json-btn');
    const previousButtonHtml = saveButton ? saveButton.innerHTML : '';

    try {
      if (saveButton) {
        saveButton.disabled = true;
        saveButton.innerHTML = `
          <i data-lucide="loader-circle" class="w-4 h-4 text-gold animate-spin"></i>
          <span>${currentLang === 'es'
            ? 'Guardando...'
            : currentLang === 'en'
              ? 'Saving...'
              : currentLang === 'nl'
                ? 'Opslaan...'
                : 'Enregistrement...'}</span>
        `;
        if (window.lucide) {
          requestAnimationFrame(() => {
            lucide.createIcons();
          });
        }
      }

      const { error } = await supabaseClient
        .from('restaurant_menus')
        .upsert(
          {
            restaurant_id: restaurantId,
            menu_json: activeRestaurantData.menu,
            menu_version: activeRestaurantData.menu?.menuVersion || 1,
            updated_at: activeRestaurantData.menu?.updatedAt || nowIso
          },
          { onConflict: 'restaurant_id' }
        );

      if (error) {
        throw error;
      }

      menuTranslationWarningNeeded = false;
      setMenuSavePending(false);

      alert(
        currentLang === 'es'
          ? 'Modificaciones del menú guardadas correctamente.'
          : currentLang === 'en'
            ? 'Menu changes saved successfully.'
            : currentLang === 'nl'
              ? 'Menuwijzigingen zijn succesvol opgeslagen.'
              : 'Modifications du menu enregistrées avec succès.'
      );
    } catch (error) {
      console.error('Erreur enregistrement menu Supabase :', error);

      alert(
        currentLang === 'es'
          ? 'Error al guardar los cambios del menú.'
          : currentLang === 'en'
            ? 'Error while saving menu changes.'
            : currentLang === 'nl'
              ? 'Fout bij het opslaan van de menuwijzigingen.'
              : 'Erreur lors de l’enregistrement des modifications du menu.'
      );
    } finally {
      if (saveButton) {
        saveButton.disabled = false;
        saveButton.innerHTML = previousButtonHtml;
        if (window.lucide) {
          requestAnimationFrame(() => {
            lucide.createIcons();
          });
        }
      }
    }
  }

  const editorToggleBtn = document.getElementById('restaurant-menu-editor-toggle');
  const editorSection = document.getElementById('restaurant-menu-editor-section');
  const addCategoryBtn = document.getElementById('restaurant-add-category-btn');
  const exportJsonBtn = document.getElementById('restaurant-save-menu-json-btn');
  const editorList = document.getElementById('restaurant-menu-categories-list');

  if (editorToggleBtn && editorSection) {
    editorToggleBtn.addEventListener('click', () => {
      const willOpen = editorSection.classList.contains('hidden');

      editorSection.classList.toggle('hidden');

      if (willOpen) {
        renderRestaurantMenuEditor();
        requestAnimationFrame(() => {
          editorSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      }
    });
  }

  if (addCategoryBtn) {
    addCategoryBtn.addEventListener('click', addRestaurantCategory);
  }

  if (exportJsonBtn) {
    exportJsonBtn.addEventListener('click', exportRestaurantJson);
  }

  if (editorList) {
    editorList.addEventListener('input', (e) => {
      if (!activeRestaurantData) return;
      setMenuSavePending(true);

      const categoryIndex = Number(e.target.dataset.categoryIndex);
      const itemIndex = Number(e.target.dataset.itemIndex);
      const field = e.target.dataset.field;

      if (field === 'category-name') {
        if (!activeRestaurantData.menu?.categories?.[categoryIndex]) return;
        activeRestaurantData.menu.categories[categoryIndex].name = e.target.value;
        markMenuTranslationWarningNeeded();
        return;
      }

      if (field === 'item-name') {
        if (!activeRestaurantData.menu?.categories?.[categoryIndex]?.items?.[itemIndex]) return;
        activeRestaurantData.menu.categories[categoryIndex].items[itemIndex].name = e.target.value;
        markMenuTranslationWarningNeeded();
        return;
      }

      if (field === 'item-subtitle') {
        if (!activeRestaurantData.menu?.categories?.[categoryIndex]?.items?.[itemIndex]) return;
        activeRestaurantData.menu.categories[categoryIndex].items[itemIndex].subtitle = e.target.value;
        markMenuTranslationWarningNeeded();
        return;
      }

      if (field === 'item-price') {
        if (!activeRestaurantData.menu?.categories?.[categoryIndex]?.items?.[itemIndex]) return;
        const parsedPrice = parseFloat(String(e.target.value).replace(',', '.'));
        activeRestaurantData.menu.categories[categoryIndex].items[itemIndex].price = Number.isNaN(parsedPrice) ? 0 : parsedPrice;
      }
    });

    editorList.addEventListener('change', (e) => {
      if (!activeRestaurantData) return;
      setMenuSavePending(true);

      const categoryIndex = Number(e.target.dataset.categoryIndex);
      const itemIndex = Number(e.target.dataset.itemIndex);
      const field = e.target.dataset.field;

      if (field === 'item-visible') {
        if (!activeRestaurantData.menu?.categories?.[categoryIndex]?.items?.[itemIndex]) return;
        activeRestaurantData.menu.categories[categoryIndex].items[itemIndex].visible = e.target.checked;
        renderRestaurantMenuEditor();
        return;
      }

      if (field === 'item-available') {
        if (!activeRestaurantData.menu?.categories?.[categoryIndex]?.items?.[itemIndex]) return;
        activeRestaurantData.menu.categories[categoryIndex].items[itemIndex].available = e.target.checked;
        renderRestaurantMenuEditor();
      }
    });

    editorList.addEventListener('click', (e) => {
      const actionButton = e.target.closest('[data-action]');
      if (!actionButton) return;

      const categoryIndex = Number(actionButton.dataset.categoryIndex);
      const itemIndex = Number(actionButton.dataset.itemIndex);
      const action = actionButton.dataset.action;

      if (action === 'add-item') {
        addRestaurantItemToCategory(categoryIndex);
        return;
      }

      if (action === 'move-item-up') {
        moveRestaurantItem(categoryIndex, itemIndex, 'up');
        return;
      }

      if (action === 'move-item-down') {
        moveRestaurantItem(categoryIndex, itemIndex, 'down');
        return;
      }

      if (action === 'move-category-up') {
        moveRestaurantCategory(categoryIndex, 'up');
        return;
      }

      if (action === 'move-category-down') {
        moveRestaurantCategory(categoryIndex, 'down');
        return;
      }

      if (action === 'delete-item') {
        deleteRestaurantItem(categoryIndex, itemIndex);
        return;
      }

      if (action === 'delete-category') {
        deleteRestaurantCategory(categoryIndex);
      }
    });
  }

  if (window.tapCartaRestaurantRefreshState.requestsIntervalId) {
    clearInterval(window.tapCartaRestaurantRefreshState.requestsIntervalId);
  }

  window.tapCartaRestaurantRefreshState.requestsIntervalId = window.setInterval(() => {
    const requestsPanelEl = document.getElementById('restaurant-requests-panel');
    const requestsCountEl = document.getElementById('restaurant-active-requests-count');
    const requestsListEl = requestsPanelEl
      ? requestsPanelEl.querySelector(':scope > .space-y-3')
      : null;

    if (!requestsPanelEl || !requestsCountEl || !requestsListEl) {
      return;
    }

    syncRequestsState();

    requestsCountEl.textContent = String(activeRequests.length);

    requestsListEl.innerHTML = activeRequests.length
      ? activeRequests.map(renderRequestRow).join('')
      : `
        <div id="restaurant-active-requests-empty" class="rounded-2xl border border-white/8 bg-black/15 px-4 py-4 text-sm text-cream/70">
          ${t.restaurantNoOrdersPending}
        </div>
      `;

    if (window.lucide) {
      requestAnimationFrame(() => {
        lucide.createIcons();
      });
    }
  }, REQUESTS_REFRESH_INTERVAL_MS);

  const googleReviewsRatingEl = document.getElementById('restaurant-google-reviews-rating');
  const googleReviewsCountEl = document.getElementById('restaurant-google-reviews-count');
  const googleReviewsRefreshBtn = document.getElementById('restaurant-google-reviews-refresh-btn');

  function refreshGoogleReviewsPanel() {
    if (!googleReviewsRatingEl || !googleReviewsCountEl) {
      return;
    }

    googleReviewsRatingEl.textContent = String(googleReviewsData.rating);
    googleReviewsCountEl.textContent = t.restaurantGoogleReviewsCount.replace('{count}', googleReviewsData.count);

    if (window.lucide) {
      requestAnimationFrame(() => {
        lucide.createIcons();
      });
    }
  }

  if (googleReviewsRefreshBtn) {
    googleReviewsRefreshBtn.addEventListener('click', refreshGoogleReviewsPanel);
  }

  if (window.tapCartaRestaurantRefreshState.googleIntervalId) {
    clearInterval(window.tapCartaRestaurantRefreshState.googleIntervalId);
  }

  window.tapCartaRestaurantRefreshState.googleIntervalId = window.setInterval(() => {
    refreshGoogleReviewsPanel();
  }, GOOGLE_REVIEWS_REFRESH_INTERVAL_MS);

  updateInstallUI();
  updateLangButtons();
}

 function ensureFreshHtmlVersion() {
  try {
    const lastLoadedVersion = localStorage.getItem(VERSION_STORAGE_KEY);
    const reloadDoneForVersion = sessionStorage.getItem(VERSION_RELOAD_FLAG_KEY);
    const currentUrl = new URL(window.location.href);
    const hasVersionInUrl = currentUrl.searchParams.has('v');

    if (hasVersionInUrl) {
      currentUrl.searchParams.delete('v');
      window.history.replaceState({}, document.title, currentUrl.toString());
    }

    if (lastLoadedVersion !== APP_VERSION) {
      localStorage.setItem(VERSION_STORAGE_KEY, APP_VERSION);

      if (reloadDoneForVersion !== APP_VERSION) {
        sessionStorage.setItem(VERSION_RELOAD_FLAG_KEY, APP_VERSION);
        window.location.reload();
        return true;
      }
    } else if (reloadDoneForVersion && reloadDoneForVersion !== APP_VERSION) {
      sessionStorage.removeItem(VERSION_RELOAD_FLAG_KEY);
    }
  } catch (err) {
    console.warn('Version refresh check failed:', err);
  }

  return false;
}

let hasReloadedForNewSW = false;

async function registerFreshServiceWorker() {
  if (!('serviceWorker' in navigator)) return;

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (hasReloadedForNewSW) return;
    hasReloadedForNewSW = true;
    window.location.reload();
  });

  try {
    const registration = await navigator.serviceWorker.register(SW_URL, {
      scope: `${BASE_PATH}/`,
      updateViaCache: 'none'
    });

    if (registration) {
      await registration.update();

      if (registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }

      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        if (!newWorker) return;

        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }
  } catch (err) {
    console.error('SW registration error:', err);
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  const manifestLink = document.getElementById('manifest-link');
  const appleTouchIconLink = document.getElementById('apple-touch-icon-link');
  const faviconLink = document.getElementById('favicon-link');
  const shortcutIconLink = document.getElementById('shortcut-icon-link');

  if (manifestLink) {
    manifestLink.href = MANIFEST_URL;
  }

  if (appleTouchIconLink) {
    appleTouchIconLink.href = ICON_192_URL;
  }

  if (faviconLink) {
    faviconLink.href = FAVICON_URL;
  }

  if (shortcutIconLink) {
    shortcutIconLink.href = FAVICON_URL;
  }

  const reloadingForFreshVersion = ensureFreshHtmlVersion();
  if (reloadingForFreshVersion) return;

  await registerFreshServiceWorker();
  await loadActiveRestaurantData();

  console.log('Restaurant actif chargé :', activeRestaurantData);

  renderMenu();

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const lang = e.currentTarget.dataset.lang;
      if (!supportedLangs.includes(lang)) return;

      currentLang = lang;
      localStorage.setItem(LANGUAGE_STORAGE_KEY, lang);
      renderMenu();
      window.scrollTo({ top: 0, behavior: 'auto' });
    });
  });
});
